<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>NFC Stub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: #141414;
      --border:  rgba(255,255,255,0.08);
      --text:    #f0f0f0;
      --muted:   #666;
      --amber:   #d4820a;
      --red:     #c0392b;
      --green:   #27ae60;
      --blue:    #2471a3;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
      gap: 32px;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 13px;
      color: var(--muted);
    }

    .dev-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(212,130,10,0.15);
      color: var(--amber);
      border: 1px solid rgba(212,130,10,0.3);
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .scenarios {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .scenario-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
      width: 100%;
    }

    .scenario-btn:active {
      background: #1e1e1e;
      border-color: rgba(255,255,255,0.14);
    }

    .scenario-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green  { background: var(--green); }
    .dot-amber  { background: var(--amber); }
    .dot-blue   { background: var(--blue); }
    .dot-red    { background: var(--red); }

    .btn-text {
      flex: 1;
    }

    .btn-label {
      font-size: 15px;
      font-weight: 500;
      display: block;
    }

    .btn-desc {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-top: 2px;
    }

    /* Config fields */
    .config-section {
      width: 100%;
      max-width: 360px;
    }

    .config-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .config-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .config-field {
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 4px;
    }

    .config-field:last-child { border-bottom: none; }

    .config-field label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .config-field input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      width: 100%;
    }

    /* Log */
    .log {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 12px;
      color: var(--muted);
      min-height: 48px;
      font-family: 'SF Mono', 'Menlo', monospace;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="dev-badge">Dev only</div>
    <h1>NFC Tap Simulator</h1>
    <p>Simulate tap scenarios without a physical NFC chip</p>
  </div>

  <!-- Stub credentials config -->
  <div class="config-section">
    <div class="config-title">Test credentials</div>
    <div class="config-body">
      <div class="config-field">
        <label>Device code</label>
        <input type="text" id="device-code" value="test-device-001" spellcheck="false">
      </div>
      <div class="config-field">
        <label>Simulated UID</label>
        <input type="text" id="uid" value="04A1B2C3D4E5F6" spellcheck="false">
      </div>
    </div>
  </div>

  <!-- Scenario buttons -->
  <div class="scenarios">

    <button class="scenario-btn" onclick="tap('owner-active')">
      <div class="dot dot-green"></div>
      <div class="btn-text">
        <span class="btn-label">Owner — active session</span>
        <span class="btn-desc">Known device, session within window → EA opens directly</span>
      </div>
    </button>

    <button class="scenario-btn" onclick="tap('owner-expired')">
      <div class="dot dot-amber"></div>
      <div class="btn-text">
        <span class="btn-label">Owner — expired session</span>
        <span class="btn-desc">Known device, session expired → challenge screen</span>
      </div>
    </button>

    <button class="scenario-btn" onclick="tap('stranger')">
      <div class="dot dot-blue"></div>
      <div class="btn-text">
        <span class="btn-label">Stranger tap</span>
        <span class="btn-desc">Unknown device → contact card</span>
      </div>
    </button>

    <button class="scenario-btn" onclick="tap('danger')">
      <div class="dot dot-red"></div>
      <div class="btn-text">
        <span class="btn-label">Danger word entry</span>
        <span class="btn-desc">Fires shell mode + silent alert</span>
      </div>
    </button>

  </div>

  <!-- Log output -->
  <div class="log" id="log">Waiting for tap…</div>

  <script>
    function log(msg) {
      document.getElementById('log').textContent = msg;
    }

    async function tap(scenario) {
      const deviceCode = document.getElementById('device-code').value.trim();
      const uid        = document.getElementById('uid').value.trim();

      if (!deviceCode || !uid) {
        log('Error: device code and UID are required');
        return;
      }

      log(`Simulating: ${scenario}…`);

      // Disable all buttons during request
      document.querySelectorAll('.scenario-btn').forEach(b => b.disabled = true);

      try {
        const params = new URLSearchParams({ d: deviceCode, uid, scenario });
        const res = await fetch(`/api/dev/tap?${params}`, { redirect: 'follow' });

        if (res.redirected) {
          log(`→ Redirecting to: ${res.url}`);
          setTimeout(() => { window.location.href = res.url; }, 600);
        } else if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          log(`Error: ${err.error ?? res.status}`);
        } else {
          log(`Done: ${res.status}`);
        }
      } catch (e) {
        log(`Error: ${e.message}`);
      }

      document.querySelectorAll('.scenario-btn').forEach(b => b.disabled = false);
    }
  </script>

</body>
</html>
