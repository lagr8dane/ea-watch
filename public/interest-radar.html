<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>EA — Interest radar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --muted: #888;
      --hi: #8ab4ff;
      --ok: #6c9;
    }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100%; }
    body { padding-bottom: 48px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 5;
    }
    h1 { font-size: 17px; font-weight: 600; }
    .nav-btn {
      background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer;
      padding: 4px 8px; line-height: 1; -webkit-tap-highlight-color: transparent;
    }

    main { padding: 16px 18px; max-width: 560px; margin: 0 auto; }

    .hint { font-size: 13px; color: var(--muted); line-height: 1.45; margin-bottom: 18px; }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }

    input[type="text"], textarea, select {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit;
    }
    textarea { min-height: 72px; resize: vertical; }

    .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .btn {
      padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-small { padding: 8px 12px; font-size: 13px; }

    .status-pill {
      margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: rgba(138,180,255,0.12);
      border: 1px solid rgba(138,180,255,0.25); font-size: 13px; line-height: 1.4;
    }
    .status-pill.warn { background: rgba(245,166,35,0.1); border-color: rgba(245,166,35,0.3); }

    .pick-list { margin-top: 10px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .pick-item {
      padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer;
      background: var(--surface);
    }
    .pick-item:last-child { border-bottom: none; }
    .pick-item:active { background: rgba(255,255,255,0.06); }
    .pick-item small { display: block; color: var(--muted); font-size: 12px; margin-top: 4px; }

    .disclaimer { font-size: 11px; color: var(--muted); margin-top: 20px; line-height: 1.5; }

    .card {
      margin-top: 14px; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface);
    }
    .card h3 { font-size: 15px; font-weight: 600; line-height: 1.35; margin-bottom: 6px; }
    .card .meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .card .summary { font-size: 14px; color: #ccc; line-height: 1.45; margin-bottom: 12px; }
    .card-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .card-actions a {
      color: var(--hi); font-size: 14px; text-decoration: none; font-weight: 500;
    }
    .card-actions a:hover { text-decoration: underline; }

    .due-picker {
      margin-top: 12px; margin-bottom: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .due-label {
      display: block; font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .due-select {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
    }
    .due-date-input {
      width: 100%; margin-top: 8px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 16px; font-family: inherit;
    }

    .empty { text-align: center; color: var(--muted); padding: 28px 16px; font-size: 14px; }
    .err { color: #e88; font-size: 14px; margin-top: 12px; white-space: pre-wrap; }

    .seg {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .seg button {
      padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .seg button.on { background: rgba(138,180,255,0.2); color: var(--text); border-color: var(--hi); }

    .radar-working {
      display: none;
      margin-top: 16px;
      padding: 20px 16px;
      border-radius: 12px;
      border: 1px solid rgba(138,180,255,0.35);
      background: rgba(138,180,255,0.08);
      text-align: center;
    }
    .radar-working.visible { display: block; }
    .radar-spinner {
      width: 36px; height: 36px;
      margin: 0 auto 14px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--hi);
      border-radius: 50%;
      animation: radar-spin 0.75s linear infinite;
    }
    @keyframes radar-spin { to { transform: rotate(360deg); } }
    .radar-working-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .radar-working-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 280px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header>
    <button type="button" class="nav-btn" onclick="navOpen()" aria-label="Menu">☰</button>
    <h1>Interest radar</h1>
    <span style="width:36px"></span>
  </header>

  <main>
    <p class="hint">Find things to do near a verified spot using your interests. Uses web search — verify times and tickets on each link. Good after tapping your watch and opening EA.</p>

    <label>Location</label>
    <input type="text" id="address" placeholder="Street, city, or ZIP" autocomplete="street-address">
    <div class="row">
      <button type="button" class="btn btn-small" id="btn-verify">Verify address</button>
      <button type="button" class="btn btn-small" id="btn-locate">Use my location</button>
    </div>
    <div id="loc-status" class="status-pill" style="display:none"></div>
    <div id="pick-wrap" style="display:none"></div>

    <label>Search radius</label>
    <select id="radius">
      <option value="10">10 miles</option>
      <option value="25" selected>25 miles</option>
      <option value="50">50 miles</option>
    </select>

    <label>When</label>
    <div class="seg" id="when-seg">
      <button type="button" data-w="tonight" class="on">Tonight</button>
      <button type="button" data-w="tomorrow">Tomorrow</button>
      <button type="button" data-w="weekend">This weekend</button>
      <button type="button" data-w="week">This week</button>
    </div>

    <label>Interests (comma or line — saved in Settings too)</label>
    <textarea id="interests" placeholder="mountain biking, photography, museums, art"></textarea>

    <div class="row" style="margin-top:18px">
      <button type="button" class="btn btn-primary" id="btn-run">Run radar</button>
    </div>

    <div id="radar-working" class="radar-working" aria-live="polite">
      <div class="radar-spinner" role="presentation"></div>
      <div class="radar-working-title" id="radar-working-title">Working…</div>
      <div class="radar-working-sub" id="radar-working-sub">Web search and maps can take 30–60 seconds. Keep this tab open.</div>
    </div>

    <div id="msg-err" class="err" style="display:none"></div>
    <p id="disclaimer" class="disclaimer" style="display:none"></p>
    <div id="results"></div>
  </main>

  <script>
    let selLat = null;
    let selLon = null;
    let selLabel = '';
    let windowKey = 'tonight';

    function showErr(t) {
      const el = document.getElementById('msg-err');
      el.style.display = t ? 'block' : 'none';
      el.textContent = t || '';
    }

    function setLocPill(html, warn) {
      const el = document.getElementById('loc-status');
      el.style.display = 'block';
      el.className = 'status-pill' + (warn ? ' warn' : '');
      el.innerHTML = html;
    }

    function hidePick() {
      document.getElementById('pick-wrap').style.display = 'none';
      document.getElementById('pick-wrap').innerHTML = '';
    }

    async function apiPost(body) {
      const res = await fetch('/api/interest-radar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || data.detail || res.statusText);
      return data;
    }

    document.getElementById('btn-verify').onclick = async function () {
      showErr('');
      hidePick();
      const q = document.getElementById('address').value.trim();
      if (!q) { showErr('Enter an address to verify.'); return; }
      this.disabled = true;
      try {
        const data = await apiPost({ mode: 'geocode', query: q });
        const results = data.results || [];
        if (!results.length) {
          setLocPill('No matches — try a simpler city + state or ZIP.', true);
          selLat = null;
          return;
        }
        if (results.length === 1) {
          pickResult(results[0]);
          return;
        }
        const wrap = document.getElementById('pick-wrap');
        wrap.style.display = 'block';
        wrap.innerHTML = '<div class="pick-list">' + results.map(function (r, i) {
          return '<div class="pick-item" data-i="' + i + '"><strong>Option ' + (i + 1) + '</strong><small>' + esc(r.display_name) + '</small></div>';
        }).join('') + '</div>';
        wrap.querySelectorAll('.pick-item').forEach(function (el) {
          el.onclick = function () {
            const i = parseInt(el.getAttribute('data-i'), 10);
            pickResult(results[i]);
            hidePick();
          };
        });
      } catch (e) {
        showErr(e.message);
      } finally {
        document.getElementById('btn-verify').disabled = false;
      }
    };

    function pickResult(r) {
      selLat = r.lat;
      selLon = r.lon;
      selLabel = r.display_name;
      setLocPill('<strong>Using</strong><br>' + esc(selLabel));
    }

    document.getElementById('btn-locate').onclick = async function () {
      showErr('');
      hidePick();
      if (!navigator.geolocation) { showErr('Geolocation not available in this browser.'); return; }
      this.disabled = true;
      navigator.geolocation.getCurrentPosition(
        async function (pos) {
          try {
            const data = await apiPost({
              mode: 'reverse',
              lat: pos.coords.latitude,
              lon: pos.coords.longitude,
            });
            selLat = data.lat;
            selLon = data.lon;
            selLabel = data.location_label;
            setLocPill('<strong>Using your location</strong><br>' + esc(selLabel));
          } catch (e) {
            showErr(e.message);
          } finally {
            document.getElementById('btn-locate').disabled = false;
          }
        },
        function () {
          document.getElementById('btn-locate').disabled = false;
          showErr('Could not read location — try verifying an address instead.');
        },
        { enableHighAccuracy: true, timeout: 12000 }
      );
    };

    document.querySelectorAll('#when-seg button').forEach(function (b) {
      b.addEventListener('click', function () {
        document.querySelectorAll('#when-seg button').forEach(function (x) { x.classList.remove('on'); });
        b.classList.add('on');
        windowKey = b.getAttribute('data-w');
      });
    });

    function longDate(d) {
      return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    function describeWindow(key) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (key === 'tonight') {
        return 'Tonight: the evening of ' + longDate(today) + ' from about 5:00 PM local time through the end of the day.';
      }
      if (key === 'tomorrow') {
        const t = new Date(today);
        t.setDate(t.getDate() + 1);
        return 'All day ' + longDate(t) + ' (local time), morning through evening.';
      }
      if (key === 'weekend') {
        const day = today.getDay();
        let dSat;
        if (day === 6) dSat = 0;
        else if (day === 0) dSat = 6;
        else dSat = 6 - day;
        const sat = new Date(today);
        sat.setDate(sat.getDate() + dSat);
        const sun = new Date(sat);
        sun.setDate(sun.getDate() + 1);
        return 'The upcoming Saturday–Sunday window: ' + longDate(sat) + ' and ' + longDate(sun) + ' (local times).';
      }
      const end = new Date(today);
      end.setDate(end.getDate() + 6);
      return 'The 7-day period from ' + longDate(today) + ' through ' + longDate(end) + ' inclusive (local dates).';
    }

    function startOfToday() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function parseLocalYmd(s) {
      if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(String(s))) return null;
      const p = String(s).split('-');
      return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
    }

    function ymd(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function upcomingWeekendDates() {
      const today = startOfToday();
      const day = today.getDay();
      let dSat;
      if (day === 6) dSat = 0;
      else if (day === 0) dSat = 6;
      else dSat = 6 - day;
      const sat = new Date(today);
      sat.setDate(sat.getDate() + dSat);
      const sun = new Date(sat);
      sun.setDate(sun.getDate() + 1);
      return { sat: sat, sun: sun };
    }

    /** Listed YYYY-MM-DD only if today or future (local); else window-based default. */
    function defaultDueForItem(item) {
      const today = startOfToday();
      const listed = item.start_date && /^\d{4}-\d{2}-\d{2}$/.test(String(item.start_date))
        ? String(item.start_date)
        : null;
      if (listed) {
        const ld = parseLocalYmd(listed);
        if (ld && ld >= today) return listed;
      }
      if (windowKey === 'tonight' || windowKey === 'week') return ymd(today);
      if (windowKey === 'tomorrow') {
        const t = new Date(today);
        t.setDate(t.getDate() + 1);
        return ymd(t);
      }
      if (windowKey === 'weekend') {
        return ymd(upcomingWeekendDates().sat);
      }
      return ymd(today);
    }

    function duePresetChoices(item) {
      const today = startOfToday();
      const out = [];
      const seen = new Set();
      function push(v, label) {
        if (!v || !/^\d{4}-\d{2}-\d{2}$/.test(v) || seen.has(v)) return;
        seen.add(v);
        out.push({ value: v, label: label });
      }

      const listed = item.start_date && /^\d{4}-\d{2}-\d{2}$/.test(String(item.start_date))
        ? String(item.start_date)
        : null;
      if (listed) {
        const ld = parseLocalYmd(listed);
        if (ld && ld >= today) push(listed, 'Listed date — ' + longDate(ld));
      }

      if (windowKey === 'tonight') {
        push(ymd(today), 'Tonight — ' + longDate(today));
      } else if (windowKey === 'tomorrow') {
        const tm = new Date(today);
        tm.setDate(tm.getDate() + 1);
        push(ymd(tm), 'Tomorrow — ' + longDate(tm));
      } else if (windowKey === 'weekend') {
        const w = upcomingWeekendDates();
        push(ymd(w.sat), 'This Saturday — ' + longDate(w.sat));
        push(ymd(w.sun), 'This Sunday — ' + longDate(w.sun));
      } else {
        const end = new Date(today);
        end.setDate(end.getDate() + 6);
        push(ymd(today), 'This week — start (' + longDate(today) + ')');
        push(ymd(end), 'This week — end (' + longDate(end) + ')');
      }

      const def = defaultDueForItem(item);
      if (!seen.has(def)) {
        const d0 = parseLocalYmd(def);
        push(def, d0 ? 'Suggested — ' + longDate(d0) : def);
      }

      if (!out.length) push(ymd(today), longDate(today));

      return { choices: out, defaultV: def };
    }

    function buildDuePickerHtml(idx, item) {
      const minYmd = ymd(startOfToday());
      const pack = duePresetChoices(item);
      const opts = pack.choices.map(function (c) {
        const sel = c.value === pack.defaultV ? ' selected' : '';
        return '<option value="' + escAttr(c.value) + '"' + sel + '>' + esc(c.label) + '</option>';
      }).join('');
      return (
        '<div class="due-picker">' +
        '<span class="due-label">Task due date</span>' +
        '<select class="due-select" data-idx="' + idx + '" aria-label="Due date preset">' +
        opts +
        '<option value="__custom__">Custom date…</option>' +
        '</select>' +
        '<input type="date" class="due-date-input" min="' + escAttr(minYmd) + '" style="display:none" aria-label="Custom due date" />' +
        '</div>'
      );
    }

    function bindDuePickerListeners() {
      document.querySelectorAll('.due-select').forEach(function (sel) {
        sel.addEventListener('change', function () {
          const picker = sel.closest('.due-picker');
          if (!picker) return;
          const inp = picker.querySelector('.due-date-input');
          const idx = parseInt(sel.getAttribute('data-idx'), 10);
          if (sel.value === '__custom__') {
            inp.style.display = 'block';
            if (!inp.value) {
              const it = lastRadarItems[idx];
              inp.value = it ? defaultDueForItem(it) : ymd(startOfToday());
            }
          } else {
            inp.style.display = 'none';
          }
        });
      });
    }

    function readDueFromCard(card, item) {
      const sel = card.querySelector('.due-select');
      const inp = card.querySelector('.due-date-input');
      if (!sel) return defaultDueForItem(item);
      if (sel.value === '__custom__') {
        const v = inp && inp.value.trim();
        if (!v || !/^\d{4}-\d{2}-\d{2}$/.test(v)) return null;
        return v;
      }
      return sel.value;
    }

    let lastRadarItems = [];

    function setWorking(visible, title, sub) {
      const wrap = document.getElementById('radar-working');
      wrap.classList.toggle('visible', !!visible);
      if (title) document.getElementById('radar-working-title').textContent = title;
      if (sub !== undefined) document.getElementById('radar-working-sub').textContent = sub;
    }

    function setRadarBusy(busy) {
      document.getElementById('btn-run').disabled = busy;
      document.getElementById('btn-verify').disabled = busy;
      document.getElementById('btn-locate').disabled = busy;
      document.getElementById('address').disabled = busy;
      document.getElementById('radius').disabled = busy;
      document.getElementById('interests').disabled = busy;
      document.querySelectorAll('#when-seg button').forEach(function (b) { b.disabled = busy; });
    }

    function renderRadarResponse(data) {
      if (data.disclaimer) {
        const d = document.getElementById('disclaimer');
        d.textContent = data.disclaimer;
        d.style.display = 'block';
      }
      const items = data.items || [];
      if (!items.length) {
        document.getElementById('results').innerHTML = '<div class="empty">No results with solid links. Try a wider radius, different window, or broader interests.</div>';
        return;
      }
      lastRadarItems = items;
      document.getElementById('results').innerHTML = items.map(function (it, idx) {
        const dist = it.distance_mi != null ? '~' + it.distance_mi + ' mi' : 'Distance unknown';
        const listedNote = (function () {
          const listed = it.start_date && /^\d{4}-\d{2}-\d{2}$/.test(String(it.start_date)) ? String(it.start_date) : null;
          if (!listed) return '';
          const ld = parseLocalYmd(listed);
          if (ld && ld >= startOfToday()) return '';
          return ' · listed date in the past — pick a due date below';
        })();
        return (
          '<div class="card" data-idx="' + idx + '">' +
          '<h3>' + esc(it.title) + '</h3>' +
          '<div class="meta">' + esc(dist) +
          (it.start_time_hint ? ' · ' + esc(it.start_time_hint) : '') +
          (it.start_date ? ' · ' + esc(it.start_date) : '') +
          esc(listedNote) + '</div>' +
          (it.summary ? '<div class="summary">' + esc(it.summary) + '</div>' : '') +
          buildDuePickerHtml(idx, it) +
          '<div class="card-actions">' +
          '<a href="' + escAttr(it.url) + '" target="_blank" rel="noopener noreferrer">Open source</a>' +
          '<button type="button" class="btn btn-small add-task-btn" data-idx="' + idx + '">Add task</button>' +
          '</div></div>'
        );
      }).join('');

      bindDuePickerListeners();

      document.querySelectorAll('.add-task-btn').forEach(function (btn) {
        btn.addEventListener('click', async function () {
          const card = btn.closest('.card');
          const idx = parseInt(btn.getAttribute('data-idx'), 10);
          const it = lastRadarItems[idx];
          if (!it || !card) return;
          const due_at = readDueFromCard(card, it);
          if (due_at == null) {
            showErr('Choose a custom due date, or pick a preset from the list.');
            return;
          }
          showErr('');
          const title = ('Go: ' + it.title).slice(0, 500);
          btn.disabled = true;
          try {
            const res = await fetch('/api/tasks', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({ title: title, due_at: due_at, priority: 'normal' }),
            });
            if (res.ok) btn.textContent = 'Added';
            else btn.textContent = 'Failed';
          } catch {
            btn.textContent = 'Failed';
          }
        });
      });
    }

    async function executeRadarSearchCore() {
      const radius = parseInt(document.getElementById('radius').value, 10) || 25;
      const interests = document.getElementById('interests').value.trim();
      const range_description = describeWindow(windowKey);
      const data = await apiPost({
        mode: 'search',
        lat: selLat,
        lon: selLon,
        location_label: selLabel,
        radius_miles: radius,
        range_description: range_description,
        interests: interests,
        window: windowKey,
      });
      renderRadarResponse(data);
    }

    function applyWhenFromUrl(when) {
      const ok = ['tonight', 'tomorrow', 'weekend', 'week'];
      if (!when || ok.indexOf(when) === -1) return;
      windowKey = when;
      document.querySelectorAll('#when-seg button').forEach(function (x) {
        x.classList.toggle('on', x.getAttribute('data-w') === when);
      });
    }

    async function resolveLocationForQuickRadar() {
      const cached = sessionStorage.getItem('ea_location');
      if (cached) {
        try {
          const o = JSON.parse(cached);
          const lat = Number(o.lat);
          const lon = Number(o.lon);
          if (Number.isFinite(lat) && Number.isFinite(lon)) {
            try {
              const data = await apiPost({ mode: 'reverse', lat: lat, lon: lon });
              selLat = data.lat;
              selLon = data.lon;
              selLabel = data.location_label || '';
              setLocPill('<strong>Using your location</strong><br>' + esc(selLabel));
              return true;
            } catch { /* try GPS */ }
          }
        } catch { /* bad cache */ }
      }
      if (!navigator.geolocation) return false;
      return await new Promise(function (resolve) {
        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            try {
              sessionStorage.setItem('ea_location', JSON.stringify({
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
              }));
              const data = await apiPost({
                mode: 'reverse',
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
              });
              selLat = data.lat;
              selLon = data.lon;
              selLabel = data.location_label || '';
              setLocPill('<strong>Using your location</strong><br>' + esc(selLabel));
              resolve(true);
            } catch {
              resolve(false);
            }
          },
          function () { resolve(false); },
          { enableHighAccuracy: true, timeout: 12000 }
        );
      });
    }

    document.getElementById('btn-run').onclick = async function () {
      showErr('');
      document.getElementById('disclaimer').style.display = 'none';
      document.getElementById('results').innerHTML = '';
      lastRadarItems = [];
      if (selLat == null || selLon == null) {
        showErr('Verify an address or use your location first.');
        return;
      }
      setWorking(true, 'Searching the web…', 'Interest radar uses search and maps — often 30–60 seconds. Keep this tab open.');
      setRadarBusy(true);
      try {
        await executeRadarSearchCore();
      } catch (e) {
        showErr(e.message);
      } finally {
        setWorking(false);
        setRadarBusy(false);
      }
    };

    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/config', { credentials: 'same-origin' });
        if (!res.ok) return;
        const c = await res.json();
        if (c.interest_radar_topics && !document.getElementById('interests').value.trim()) {
          document.getElementById('interests').value = c.interest_radar_topics;
        }
      } catch { /* ignore */ }
    }

    async function maybeAutoRunFromChip() {
      const p = new URLSearchParams(location.search);
      if (p.get('auto') !== '1' && p.get('quick') !== '1') return;
      applyWhenFromUrl(p.get('when'));
      showErr('');
      document.getElementById('disclaimer').style.display = 'none';
      document.getElementById('results').innerHTML = '';
      lastRadarItems = [];

      setWorking(true, 'Getting your location…', 'Reuses EA’s cached spot when you already shared location there.');
      setRadarBusy(true);
      try {
        const ok = await resolveLocationForQuickRadar();
        if (!ok) {
          showErr('Could not determine location — verify an address or tap Use my location, then Run radar.');
          return;
        }
        setWorking(true, 'Searching the web…', 'Matching your interests near you — often 30–60 seconds. Keep this tab open.');
        await executeRadarSearchCore();
      } catch (e) {
        showErr(e.message);
      } finally {
        setWorking(false);
        setRadarBusy(false);
      }
    }

    (async function boot() {
      await loadConfig();
      await maybeAutoRunFromChip();
    })();
  </script>
  <script src="/nav.js?v=radar4" defer></script>
</body>
