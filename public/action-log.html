<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EA — Action Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #0a0a0a;
    --surface:   #161616;
    --border:    #2a2a2a;
    --border-hi: #404040;
    --text:      #f0f0f0;
    --text-dim:  #888888;
    --text-mid:  #bbbbbb;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --green:     #4caf7d;
    --amber:     #f5a623;
    --red:       #e05252;
    --blue:      #7b9ce8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .back-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }

  h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--border-hi);
    color: var(--text-dim);
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--text-dim); color: var(--text); }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 0;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-mid);
    padding: 5px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    margin-right: -1px;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--border-hi); z-index: 1; position: relative; }
  .filter-btn.active { background: var(--surface); color: var(--text); border-color: var(--border-hi); z-index: 1; position: relative; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 0;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }

  .stat {
    padding: 10px 16px 10px 0;
    margin-right: 16px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat:last-child { border-right: none; }
  .stat-value {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── Log entries ── */
  .log-body { flex: 1; padding: 0; }

  .day-group { margin-bottom: 0; }

  .day-header {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-mid);
    padding: 14px 20px 8px;
    background: var(--bg);
    position: sticky;
    top: 57px;
    z-index: 5;
    border-bottom: 1px solid var(--border);
  }

  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: default;
  }
  .log-entry:hover { background: var(--surface); }

  .outcome-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dot-success  { background: var(--green); }
  .dot-skipped  { background: var(--text-dim); }
  .dot-failed   { background: var(--red); }
  .dot-aborted  { background: var(--amber); }

  .entry-main { flex: 1; min-width: 0; }

  .entry-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }

  .entry-action {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }

  .entry-chain {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry-detail {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry-error {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    margin-top: 3px;
  }

  .entry-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ── Outcome badge ── */
  .outcome-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 1px 6px;
    flex-shrink: 0;
  }
  .badge-success  { background: #1a2a1a; color: var(--green); }
  .badge-skipped  { background: #1e1e1e; color: var(--text-dim); }
  .badge-failed   { background: #2a1a1a; color: var(--red); }
  .badge-aborted  { background: #2a2a1a; color: var(--amber); }

  /* ── Empty / loading ── */
  .state-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-align: center;
    padding: 20px;
    line-height: 2;
  }

  .entry-debug-type {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .entry-debug-json {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 240px;
    overflow: auto;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>Log</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="refresh-btn" onclick="loadLog()">Refresh</button>
      <button onclick="navOpen()" style="background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;">
        <span style="display:block;width:20px;height:1.5px;background:#888;border-radius:1px;"></span>
        <span style="display:block;width:20px;height:1.5px;background:#888;border-radius:1px;"></span>
        <span style="display:block;width:20px;height:1.5px;background:#888;border-radius:1px;"></span>
      </button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all"     onclick="setFilter('all',     this)">All</button>
    <button class="filter-btn"        data-filter="success"  onclick="setFilter('success',  this)">Success</button>
    <button class="filter-btn"        data-filter="skipped"  onclick="setFilter('skipped',  this)">Skipped</button>
    <button class="filter-btn"        data-filter="failed"   onclick="setFilter('failed',   this)">Failed</button>
    <button class="filter-btn"        data-filter="aborted"  onclick="setFilter('aborted',  this)">Aborted</button>
    <button class="filter-btn"        data-filter="chains"   onclick="setFilter('chains',   this)">Chains only</button>
    <button class="filter-btn"        data-filter="ea"        onclick="setFilter('ea',        this)">Assistant</button>
  </div>

  <div id="statsBar" class="stats-bar" style="display:none">
    <div class="stat"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-value" id="statSuccess" style="color:var(--green)">—</div><div class="stat-label">Success</div></div>
    <div class="stat"><div class="stat-value" id="statFailed" style="color:var(--red)">—</div><div class="stat-label">Failed</div></div>
    <div class="stat"><div class="stat-value" id="statChains">—</div><div class="stat-label">Chains</div></div>
    <div class="stat"><div class="stat-value" id="statEa">—</div><div class="stat-label">Assistant</div></div>
  </div>

  <div id="logBody" class="log-body">
    <div class="state-msg">Loading...</div>
  </div>
</div>

<script>
const urlDebug = new URLSearchParams(location.search).get('debug') === '1' ||
  new URLSearchParams(location.search).get('debug') === 'true';

let allEntries = [];
let activeFilter = 'all';

// ---------------------------------------------------------------------------
// Load
// ---------------------------------------------------------------------------
async function loadLog() {
  document.getElementById('logBody').innerHTML = '<div class="state-msg">Loading...</div>';
  try {
    const res = await fetch('/api/chain-execute/log?limit=200');
    if (res.status === 401) { window.location = '/'; return; }
    const data = await res.json();
    allEntries = data.log || [];
    renderStats();
    renderLog();
  } catch {
    document.getElementById('logBody').innerHTML = '<div class="state-msg">Failed to load log.</div>';
  }
}

// ---------------------------------------------------------------------------
// Stats
// ---------------------------------------------------------------------------
function renderStats() {
  if (allEntries.length === 0) {
    document.getElementById('statsBar').style.display = 'none';
    return;
  }
  document.getElementById('statsBar').style.display = '';
  document.getElementById('statTotal').textContent   = allEntries.length;
  document.getElementById('statSuccess').textContent = allEntries.filter(e => e.outcome === 'success').length;
  document.getElementById('statFailed').textContent  = allEntries.filter(e => e.outcome === 'failed').length;
  document.getElementById('statChains').textContent  = allEntries.filter(e => e.chain_state_id).length;
  document.getElementById('statEa').textContent      = allEntries.filter(e => isEaEntry(e)).length;
}

// ---------------------------------------------------------------------------
// Filter
// ---------------------------------------------------------------------------
function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLog();
}

function isEaEntry(e) {
  const t = String(e.action_type || '');
  return t.startsWith('ea_');
}

function applyFilter(entries) {
  if (activeFilter === 'all')    return entries;
  if (activeFilter === 'chains') return entries.filter(e => e.chain_state_id);
  if (activeFilter === 'ea')    return entries.filter(e => isEaEntry(e));
  return entries.filter(e => e.outcome === activeFilter);
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function renderLog() {
  const body = document.getElementById('logBody');
  const filtered = applyFilter(allEntries);

  if (filtered.length === 0) {
    body.innerHTML = `<div class="state-msg">No entries${activeFilter !== 'all' ? ' matching this filter' : ''}.${allEntries.length === 0 ? '<br>Routine runs, shortcuts, and EA activity (tasks, briefings, menus) show up here as you use the app.' : ''}</div>`;
    return;
  }

  // Group by day
  const groups = {};
  for (const entry of filtered) {
    const day = formatDay(entry.executed_at);
    if (!groups[day]) groups[day] = [];
    groups[day].push(entry);
  }

  body.innerHTML = Object.entries(groups).map(([day, entries]) => `
    <div class="day-group">
      <div class="day-header">${day}</div>
      ${entries.map(renderEntry).join('')}
    </div>
  `).join('');
}

function renderEntry(e) {
  const cfg = e.action_config || {};
  const detail = entryDetail(e, cfg);
  const chainLabel = e.chain_name ? `· ${esc(e.chain_name)}` : '';
  const label = formatActionLabel(e.action_type);
  const debugType = urlDebug ? `<div class="entry-debug-type">${esc(e.action_type)}</div>` : '';
  const debugJson = urlDebug
    ? `<div class="entry-debug-json">${esc(JSON.stringify(cfg, null, 2))}</div>`
    : '';

  return `
    <div class="log-entry">
      <div class="outcome-dot dot-${e.outcome}"></div>
      <div class="entry-main">
        <div class="entry-top">
          <span class="entry-action">${esc(label)}</span>
          <span class="outcome-badge badge-${e.outcome}">${e.outcome}</span>
          ${chainLabel ? `<span class="entry-chain">${esc(chainLabel)}</span>` : ''}
        </div>
        ${debugType}
        ${detail ? `<div class="entry-detail">${esc(detail)}</div>` : ''}
        ${e.error_detail ? `<div class="entry-error">${esc(e.error_detail)}</div>` : ''}
        ${debugJson}
      </div>
      <div class="entry-time">${formatTime(e.executed_at)}</div>
    </div>
  `;
}

function formatActionLabel(type) {
  const t = String(type || '');
  const map = {
    ea_routine_menu: 'Routine menu',
    ea_weather: 'Weather',
    ea_news: 'News',
    ea_news_more: 'More headlines',
    ea_mindful: 'Mindful moment',
    ea_inspire: 'Inspiration',
    ea_morning_briefing: 'Morning briefing',
    ea_task_list: 'Task list',
    ea_task_add: 'Task added',
    ea_task_complete: 'Task completed',
    ea_task_delete: 'Task removed',
    ea_task_edit: 'Task updated',
    ea_task_error: 'Task error',
    ea_interest_radar: 'Interest radar',
  };
  if (map[t]) return map[t];
  if (t.startsWith('ea_briefing_')) return 'Briefing';
  return t || 'Action';
}

function entryDetail(e, cfg) {
  if (e.action_type === 'deeplink') {
    if (cfg.kind === 'maps')    return cfg.destination ? `Maps → ${cfg.destination}` : 'Maps';
    if (cfg.kind === 'call')    return `Call ${cfg.number || ''}`;
    if (cfg.kind === 'facetime')return `FaceTime ${cfg.contact || ''}`;
    if (cfg.kind === 'sms')     return `SMS ${cfg.number || ''}`;
    if (cfg.kind === 'spotify') return `Spotify: ${cfg.uri || ''}`;
    if (cfg.kind === 'timer')   return `Timer: ${cfg.minutes} min`;
    if (cfg.kind === 'reminder')return `Reminder: ${cfg.title || ''}`;
    if (cfg.kind === 'dnd')     return 'Do Not Disturb';
    if (cfg.kind === 'url')     return cfg.url || '';
    return cfg.kind || '';
  }
  if (e.action_type === 'shortcut')      return cfg.name ? `Shortcut: ${cfg.name}` : 'Shortcut';
  if (e.action_type === 'message')       return cfg.text ? truncate(cfg.text, 60) : '';
  if (e.action_type === 'weather_check') return `Weather check — ${cfg.condition || ''}`;
  if (e.action_type === 'time_check')    return `Time check — ${cfg.after || '?'}–${cfg.before || '?'}`;
  if (e.action_type === 'calendar_check')return 'Calendar check';

  if (e.action_type === 'ea_routine_menu') {
    const n = cfg.routine_count;
    return n != null ? `${n} routine${n === 1 ? '' : 's'}` : '';
  }
  if (e.action_type === 'ea_weather') {
    const loc = cfg.location_label || cfg.location;
    if (loc && cfg.temp != null) return `${loc} · ${cfg.temp}°F`;
    if (cfg.source === 'ea_chat') return 'Opened from chat';
    if (cfg.source === 'briefing_api') return 'Briefing panel';
    return '';
  }
  if (e.action_type === 'ea_news' || e.action_type === 'ea_news_more') {
    const parts = [];
    if (cfg.story_count != null) parts.push(`${cfg.story_count} stor${cfg.story_count === 1 ? 'y' : 'ies'}`);
    if (cfg.page != null && e.action_type === 'ea_news_more') parts.push(`page ${cfg.page}`);
    if (cfg.personalized) parts.push('personalized');
    return parts.join(' · ') || '';
  }
  if (e.action_type === 'ea_morning_briefing') {
    const parts = [];
    if (cfg.story_count != null) parts.push(`${cfg.story_count} headlines`);
    if (cfg.has_weather) parts.push('weather');
    if (cfg.panel_types && cfg.panel_types.length) parts.push(cfg.panel_types.join(', '));
    return parts.join(' · ') || 'Full briefing';
  }
  if (e.action_type === 'ea_task_list') {
    return cfg.filter ? `${cfg.filter} · ${cfg.open_count ?? 0} open` : `${cfg.open_count ?? 0} open`;
  }
  if (e.action_type === 'ea_task_add' && cfg.title) return truncate(cfg.title, 72);
  if (e.action_type === 'ea_task_complete' && cfg.title) return truncate(cfg.title, 72);
  if (e.action_type === 'ea_task_delete' && cfg.title) return truncate(cfg.title, 72);
  if (e.action_type === 'ea_task_edit') return cfg.title ? truncate(cfg.title, 72) : 'Details updated';
  if (e.action_type === 'ea_mindful' && cfg.title) return truncate(cfg.title, 56);
  if (e.action_type === 'ea_inspire' && cfg.title) return truncate(cfg.title, 56);
  if (String(e.action_type || '').startsWith('ea_briefing_')) return cfg.mode || '';

  if (e.action_type === 'ea_interest_radar') {
    const parts = [];
    if (cfg.window) parts.push(cfg.window);
    if (cfg.radius_miles != null) parts.push(cfg.radius_miles + ' mi');
    if (cfg.item_count != null) parts.push(cfg.item_count + ' picks');
    return parts.join(' · ') || '';
  }

  return '';
}

// ---------------------------------------------------------------------------
// Formatting
// ---------------------------------------------------------------------------
function formatDay(iso) {
  if (!iso) return 'Unknown';
  const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (sameDay(d, today))     return 'Today';
  if (sameDay(d, yesterday)) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
loadLog();

    // --- Nav drawer ---
    (function() {
      var style = document.createElement("style");
      style.textContent = ".nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:10040;opacity:0;pointer-events:none;transition:opacity 0.22s;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}.nav-overlay.open{opacity:1;pointer-events:auto}.nav-drawer{position:fixed;top:0;right:0;bottom:0;width:68vw;max-width:260px;background:#141414;z-index:10050;transform:translateX(100%);transition:transform 0.26s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.08);padding-top:env(safe-area-inset-top)}.nav-drawer.open{transform:translateX(0)}.nav-drawer-top{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between}.nav-drawer-label{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#555}.nav-x{background:none;border:none;color:#aaa;font-size:28px;line-height:1;cursor:pointer;padding:8px 12px;margin:-8px -8px -8px 0;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.nav-list{padding:8px 0}.nav-link{display:block;padding:17px 22px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:400;color:#aaa;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}.nav-link.active{color:#f0f0f0;font-weight:600;border-left-color:#f0f0f0}";
      document.head.appendChild(style);
      var overlay = document.createElement("div");
      overlay.className = "nav-overlay";
      var items = [{label:"EA",path:"/ea"},{label:"Tasks",path:"/tasks"},{label:"Radar",path:"/interest-radar"},{label:"Routines",path:"/chains"},{label:"Log",path:"/action-log"},{label:"Settings",path:"/config"}];
      var cur = window.location.pathname;
      var dbg = new URLSearchParams(location.search).get("debug");
      var dq = (dbg === "1" || dbg === "true") ? "?debug=1" : "";
      var drawer = document.createElement("div");
      drawer.className = "nav-drawer";
      drawer.innerHTML = "<div class=\"nav-drawer-top\"><span class=\"nav-drawer-label\">EA Watch</span><button type=\"button\" class=\"nav-x\" aria-label=\"Close menu\">×</button></div><div class=\"nav-list\">" + items.map(function(item){ var active = cur === item.path || (item.path !== "/ea" && cur.indexOf(item.path) === 0); var href = item.path + dq; return "<a class=\"nav-link" + (active ? " active" : "") + "\" href=\"" + href + "\">" + item.label + "</a>"; }).join("") + "</div>";
      function closeNav(){ overlay.classList.remove("open"); drawer.classList.remove("open"); document.body.style.overflow=""; }
      function openNav(){ overlay.classList.add("open"); drawer.classList.add("open"); document.body.style.overflow="hidden"; }
      overlay.addEventListener("click", closeNav);
      drawer.addEventListener("click", function(e){ e.stopPropagation(); });
      drawer.querySelector(".nav-x").addEventListener("click", function(e){ e.preventDefault(); e.stopPropagation(); closeNav(); });
      document.body.appendChild(overlay);
      document.body.appendChild(drawer);
      window.navOpen  = openNav;
      window.navClose = closeNav;
    })();
</script>
</body>
</html>
