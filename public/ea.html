<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>EA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --surface2: #1c1c1c;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0f0f0;
      --muted:    #666;
      --ea-msg:   #1c1c1c;
      --user-msg: #2a2a2a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ea-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .ea-status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a3;
    }

    .status-dot.shell {
      background: #a63;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }

    .icon-btn:active { color: var(--text); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* EA message row — avatar + bubble */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      align-self: flex-start;
      max-width: 92%;
    }

    .ea-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.8);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
    }

    .msg.ea {
      background: #181825;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 4px;
      color: #e8e8f0;
      border-left: 2px solid rgba(100, 100, 200, 0.3);
    }

    .msg.user {
      background: #1e1e1e;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      color: var(--text);
      max-width: 82%;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .msg.ea.typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%            { opacity: 1; }
    }

    /* ── Briefing card ── */
    .briefing-card {
      align-self: stretch;
      background: #0d0d14;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .briefing-weather {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #0d1117 0%, #0d1929 100%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .briefing-weather-icon {
      font-size: 44px;
      line-height: 1;
      flex-shrink: 0;
    }

    .briefing-weather-main {
      flex: 1;
    }

    .briefing-temp {
      font-size: 36px;
      font-weight: 300;
      color: #f0f0f0;
      letter-spacing: -1px;
      line-height: 1;
    }

    .briefing-condition {
      font-size: 14px;
      color: #8888aa;
      margin-top: 3px;
    }

    .briefing-weather-details {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .briefing-weather-detail {
      font-size: 12px;
      color: #666688;
    }

    .briefing-outdoor-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(76, 175, 125, 0.15);
      border: 1px solid rgba(76, 175, 125, 0.3);
      color: #4caf7d;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 8px;
    }

    .briefing-news {
      padding: 4px 0;
    }

    .briefing-news-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .briefing-news-item:last-child { border-bottom: none; }
    .briefing-news-item:active { background: rgba(255,255,255,0.03); }

    .briefing-news-content { flex: 1; min-width: 0; }

    .briefing-news-title {
      font-size: 14px;
      color: #d0d0e0;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .briefing-news-source {
      font-size: 11px;
      color: #555570;
      margin-top: 3px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .briefing-news-arrow {
      color: #444460;
      font-size: 16px;
      flex-shrink: 0;
    }

    .briefing-quote {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      color: #666688;
      font-style: italic;
      line-height: 1.5;
    }

    .briefing-attribution {
      padding: 10px 20px;
      font-size: 10px;
      color: #333350;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,255,255,0.04);
    }


    /* Input bar */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 10px 16px;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within {
      border-color: rgba(255,255,255,0.15);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      -webkit-appearance: none;
    }

    textarea::placeholder { color: var(--muted); }

    .voice-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }

    .voice-btn.listening {
      color: #e05;
      animation: pulse-red 1s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .send-btn:not(:disabled):active { opacity: 0.8; }

    /* Chain control buttons — rendered inside an EA message bubble */
    .chain-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .chain-btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .chain-btn:active { opacity: 0.7; }

    .chain-btn-continue {
      background: var(--text);
      color: var(--bg);
    }
    .chain-btn-skip {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .chain-btn-stop {
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    /* Action pill — shown when a deeplink/shortcut fires */
    .action-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
      text-decoration: none;
    }
    .action-pill:active { color: var(--text); }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="ea-name">EA</div>
      <div class="ea-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">ready</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="Clear">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
        </svg>
      </button>
      <button onclick="navOpen()" style="background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;">
        <span style="display:block;width:20px;height:1.5px;background:#888;border-radius:1px;"></span>
        <span style="display:block;width:20px;height:1.5px;background:#888;border-radius:1px;"></span>
        <span style="display:block;width:20px;height:1.5px;background:#888;border-radius:1px;"></span>
      </button>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Message EA…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="voice-btn" id="voice-btn" onclick="toggleVoice()" title="Voice input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/>
        </svg>
      </button>
    </div>
    <button class="send-btn" id="send-btn" onclick="send()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>
  </div>

  <script>
    const params   = new URLSearchParams(location.search);
    const isShell  = params.get('shell') === '1';
    const messages = [];
    let   isTyping = false;
    let   recognition = null;
    let   userLat = null;
    let   userLon = null;

    // Request location silently — used for weather briefings
    // Cached in sessionStorage so we only ask once per session
    function requestLocation() {
      if (!navigator.geolocation) return;

      // Use cached coords if available
      const cached = sessionStorage.getItem('ea_location');
      if (cached) {
        try {
          const { lat, lon } = JSON.parse(cached);
          userLat = lat;
          userLon = lon;
          return;
        } catch {}
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          sessionStorage.setItem('ea_location', JSON.stringify({ lat: userLat, lon: userLon }));
        },
        () => {} // Fail silently — server falls back to Reno coords
      );
    }

    // Shell mode indicator
    if (isShell) {
      document.getElementById('status-dot').classList.add('shell');
      document.getElementById('status-text').textContent = 'active';
    }

    let ownerFirstName = null;

    // Fetch owner name for personalised greeting
    async function loadOwnerName() {
      try {
        const res = await fetch('/api/config/public');
        if (res.ok) {
          const c = await res.json();
          if (c.display_name) {
            ownerFirstName = c.display_name.split(' ')[0];
          }
        }
      } catch {}
    }

    // Greeting on load + request location + load owner name
    window.addEventListener('load', async () => {
      requestLocation();
      await loadOwnerName();
      const hour = new Date().getHours();
      const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
      const name = ownerFirstName ? `, ${ownerFirstName}` : '';
      appendMsg('ea', `${greet}${name}! How can I help?`);
    });

    // --- Message rendering ---

    function eaAvatar() {
      const av = document.createElement('div');
      av.className = 'ea-avatar';
      av.textContent = 'EA';
      return av;
    }

    function appendMsg(role, text) {
      if (role === 'ea') {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.appendChild(eaAvatar());
        const el = document.createElement('div');
        el.className = 'msg ea';
        el.style.whiteSpace = 'pre-wrap';
        el.textContent = text;
        row.appendChild(el);
        document.getElementById('messages').appendChild(row);
        scrollBottom();
        return el;
      } else {
        const el = document.createElement('div');
        el.className = 'msg user';
        el.style.whiteSpace = 'pre-wrap';
        el.textContent = text;
        document.getElementById('messages').appendChild(el);
        scrollBottom();
        return el;
      }
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row';
      row.id = 'typing-row';
      row.appendChild(eaAvatar());
      const el = document.createElement('div');
      el.className = 'msg ea typing';
      el.id = 'typing';
      el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      row.appendChild(el);
      document.getElementById('messages').appendChild(row);
      scrollBottom();
    }

    function hideTyping() {
      document.getElementById('typing-row')?.remove();
      document.getElementById('typing')?.remove();
    }

    // --- Briefing card ---

    function renderBriefingCard(data) {
      const card = document.createElement('div');
      card.className = 'briefing-card';

      // Weather section
      if (data.weather) {
        const w = data.weather;
        const section = document.createElement('div');
        section.className = 'briefing-weather';

        const icon = document.createElement('div');
        icon.className = 'briefing-weather-icon';
        icon.textContent = weatherEmoji(w.condition);

        const main = document.createElement('div');
        main.className = 'briefing-weather-main';
        main.innerHTML = `
          <div class="briefing-temp">${w.temp}°F</div>
          <div class="briefing-condition">${w.condition} · Feels like ${w.feels_like}°</div>
          <div class="briefing-weather-details">
            <span class="briefing-weather-detail">H: ${w.high}° L: ${w.low}°</span>
            <span class="briefing-weather-detail">UV: ${w.uv_index}</span>
            <span class="briefing-weather-detail">Rain: ${w.rain_chance}%</span>
            <span class="briefing-weather-detail">Wind: ${w.wind} mph</span>
          </div>
          ${w.outdoor_good ? '<div class="briefing-outdoor-pill">✦ Good day outside</div>' : ''}
        `;

        section.appendChild(icon);
        section.appendChild(main);
        card.appendChild(section);
      }

      // News section
      if (data.news && data.news.length > 0) {
        const newsSection = document.createElement('div');
        newsSection.className = 'briefing-news';

        data.news.forEach(story => {
          const item = document.createElement('a');
          item.className = 'briefing-news-item';
          item.href = story.url || '#';
          item.target = '_blank';
          item.rel = 'noopener noreferrer';
          item.innerHTML = `
            <div class="briefing-news-content">
              <div class="briefing-news-title">${esc(story.title)}</div>
              <div class="briefing-news-source">${esc(story.source)}</div>
            </div>
            <div class="briefing-news-arrow">›</div>
          `;
          newsSection.appendChild(item);
        });

        card.appendChild(newsSection);
      }

      // Quote/closing
      if (data.quote) {
        const quote = document.createElement('div');
        quote.className = 'briefing-quote';
        quote.textContent = data.quote;
        card.appendChild(quote);
      }

      // Attribution
      const attr = document.createElement('div');
      attr.className = 'briefing-attribution';
      attr.textContent = 'Weather · Open-Meteo   ·   News · NewsAPI';
      card.appendChild(attr);

      return card;
    }

    function weatherEmoji(condition) {
      if (!condition) return '🌤';
      const c = condition.toLowerCase();
      if (c.includes('clear'))      return '☀️';
      if (c.includes('partly'))     return '⛅️';
      if (c.includes('overcast'))   return '☁️';
      if (c.includes('fog'))        return '🌫';
      if (c.includes('drizzle'))    return '🌦';
      if (c.includes('rain'))       return '🌧';
      if (c.includes('snow'))       return '❄️';
      if (c.includes('thunder'))    return '⛈';
      return '🌤';
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // --- Independent card renderers for morning briefing ---

    function appendWeatherCard(w) {
      if (!w) return;
      const card = document.createElement('div');
      card.className = 'briefing-card';
      card.innerHTML = `
        <div class="briefing-weather">
          <div class="briefing-weather-icon">${weatherEmoji(w.condition)}</div>
          <div class="briefing-weather-main">
            <div class="briefing-temp">${w.temp}°F</div>
            <div class="briefing-condition">${esc(w.condition)} · Feels like ${w.feels_like}°</div>
            <div class="briefing-weather-details">
              <span class="briefing-weather-detail">H: ${w.high}° L: ${w.low}°</span>
              <span class="briefing-weather-detail">UV: ${w.uv_index}</span>
              <span class="briefing-weather-detail">Rain: ${w.rain_chance}%</span>
              <span class="briefing-weather-detail">Wind: ${w.wind} mph</span>
            </div>
            ${w.outdoor_good ? '<div class="briefing-outdoor-pill">✦ Good day outside</div>' : ''}
          </div>
        </div>
        <div class="briefing-attribution">Open-Meteo</div>
      `;
      document.getElementById('messages').appendChild(card);
      scrollBottom();
    }

    function appendNewsCard(news) {
      if (!news || news.length === 0) return;
      const card = document.createElement('div');
      card.className = 'briefing-card';
      const newsHtml = news.map(story => `
        <a class="briefing-news-item" href="${esc(story.url || '#')}" target="_blank" rel="noopener noreferrer">
          <div class="briefing-news-content">
            <div class="briefing-news-title">${esc(story.title)}</div>
            <div class="briefing-news-source">${esc(story.source)}</div>
          </div>
          <div class="briefing-news-arrow">›</div>
        </a>
      `).join('');
      card.innerHTML = `
        <div class="briefing-news">${newsHtml}</div>
        <div class="briefing-attribution">NewsAPI</div>
      `;
      document.getElementById('messages').appendChild(card);
      scrollBottom();
    }

    function appendQuoteCard(quote) {
      if (!quote) return;
      const card = document.createElement('div');
      card.className = 'briefing-card';
      card.innerHTML = `<div class="briefing-quote">${esc(quote)}</div>`;
      document.getElementById('messages').appendChild(card);
      scrollBottom();
    }

    function scrollBottom() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    function clearChat() {
      document.getElementById('messages').innerHTML = '';
      messages.length = 0;
      appendMsg('ea', 'Chat cleared. What do you need?');
    }

    // --- Input ---

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
      document.getElementById('send-btn').disabled = !e.target.value.trim();
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      document.getElementById('send-btn').disabled = !el.value.trim();
    }

    // --- Send ---

    async function send() {
      const input = document.getElementById('input');
      const text  = input.value.trim();
      if (!text || isTyping) return;

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      appendMsg('user', text);
      messages.push({ role: 'user', content: text });

      isTyping = true;
      setStatus('thinking…');
      showTyping();

      try {
        const res = await fetch('/api/ea', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, shell: isShell, lat: userLat, lon: userLon, localHour: new Date().getHours() }),
        });

        hideTyping();

        if (!res.ok) {
          appendMsg('ea', 'Something went wrong. Try again.');
          isTyping = false;
          setStatus('ready');
          return;
        }

        // Stream response
        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   eaEl    = appendMsg('ea', '');
        let   full    = '';
        let   pendingActions  = [];
        let   chainControl    = null;
        let   sseBuffer       = '';

        setStatus('responding…');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          sseBuffer += chunk;

          // Process complete lines only
          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop(); // keep incomplete last line in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);

              // Text delta — stream into current message bubble
              if (parsed.delta?.text) {
                full += parsed.delta.text;
                eaEl.textContent = full;
                scrollBottom();
              }

              // new_bubble — start a fresh EA message for next section
              if (parsed.new_bubble) {
                messages.push({ role: 'assistant', content: full });
                full = '';
                eaEl = appendMsg('ea', '');
              }

              // Actions and chain control
              if (parsed.actions) pendingActions = parsed.actions;
              if (parsed.chain_control) chainControl = parsed.chain_control;

              // Morning briefing — fire three separate requests sequentially
              if (parsed.morning_briefing) {
                setTimeout(async () => {
                  await sendBriefingPart('weather');
                  await sendBriefingPart('top news');
                  await sendBriefingPart('morning quote');
                }, 100);
              }
            } catch {}
          }
        }

        // Remove empty EA bubble if nothing was streamed into it
        if (eaEl && !full) {
          eaEl.closest('.msg-row')?.remove();
        }

        // Fire any pending OS actions (deeplinks / Siri Shortcuts)
        for (const action of pendingActions) {
          if (action.url) {
            fireAction(action, eaEl);
          }
        }

        // Render chain control buttons if we're awaiting a confirmable step
        if (chainControl) {
          renderChainControls(eaEl, chainControl, full);
        }

        messages.push({ role: 'assistant', content: full });
        setStatus('ready');
      } catch (e) {
        hideTyping();
        appendMsg('ea', 'Connection lost. Try again.');
        setStatus('ready');
      }

      isTyping = false;
      input.focus();
    }

    function setStatus(text) {
      document.getElementById('status-text').textContent = text;
    }

    // Sends a single briefing request and waits for it to complete
    async function sendBriefingPart(text) {
      setStatus('thinking…');
      showTyping();

      try {
        const res = await fetch('/api/ea', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: text }],
            shell: isShell, lat: userLat, lon: userLon,
            localHour: new Date().getHours()
          }),
        });

        hideTyping();
        if (!res.ok) return;

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        const eaEl    = appendMsg('ea', '');
        let   full    = '';
        let   buf     = '';

        setStatus('responding…');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.delta?.text) {
                full += parsed.delta.text;
                eaEl.textContent = full;
                scrollBottom();
              }
            } catch {}
          }
        }

        // Remove empty bubble if nothing came back
        if (!full) eaEl.closest('.msg-row')?.remove();

      } catch {}

      setStatus('ready');
    }

    // --- Voice input (Web Speech API) ---

    function toggleVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        appendMsg('ea', 'Voice input isn\'t supported on this browser. Try Chrome or Safari.');
        return;
      }

      if (recognition) {
        recognition.stop();
        recognition = null;
        document.getElementById('voice-btn').classList.remove('listening');
        return;
      }

      const SR = window.SpeechRecognition ?? window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous      = false;
      recognition.interimResults  = true;
      recognition.lang            = 'en-US';

      document.getElementById('voice-btn').classList.add('listening');
      setStatus('listening…');

      recognition.onresult = (e) => {
        const transcript = Array.from(e.results)
          .map(r => r[0].transcript)
          .join('');
        document.getElementById('input').value = transcript;
        document.getElementById('send-btn').disabled = !transcript.trim();
      };

      recognition.onend = () => {
        document.getElementById('voice-btn').classList.remove('listening');
        recognition = null;
        setStatus('ready');
        // Auto-send if we got something
        const val = document.getElementById('input').value.trim();
        if (val) send();
      };

      recognition.onerror = () => {
        document.getElementById('voice-btn').classList.remove('listening');
        recognition = null;
        setStatus('ready');
      };

      recognition.start();
    }

    // --- Chain controls ---

    /**
     * Render Continue / Skip / Stop buttons inside an EA message bubble.
     * Called after a confirmable or required step pauses the chain.
     */
    function renderChainControls(eaEl, control, promptText) {
      const { chainStateId, skippable } = control;

      const wrap = document.createElement('div');
      wrap.className = 'chain-controls';

      const continueBtn = document.createElement('button');
      continueBtn.className = 'chain-btn chain-btn-continue';
      continueBtn.textContent = 'Continue';
      continueBtn.onclick = () => resolveChain(chainStateId, 'continue', eaEl, wrap);
      wrap.appendChild(continueBtn);

      if (skippable) {
        const skipBtn = document.createElement('button');
        skipBtn.className = 'chain-btn chain-btn-skip';
        skipBtn.textContent = 'Skip this step';
        skipBtn.onclick = () => resolveChain(chainStateId, 'skip', eaEl, wrap);
        wrap.appendChild(skipBtn);
      }

      const stopBtn = document.createElement('button');
      stopBtn.className = 'chain-btn chain-btn-stop';
      stopBtn.textContent = 'Stop chain';
      stopBtn.onclick = () => resolveChain(chainStateId, 'abort', eaEl, wrap);
      wrap.appendChild(stopBtn);

      eaEl.appendChild(wrap);
      scrollBottom();
    }

    /**
     * Call /api/chain-execute with the user's choice, then render the result.
     */
    async function resolveChain(chainStateId, action, eaEl, controlWrap) {
      // Remove buttons immediately — prevent double-tap
      controlWrap.remove();
      setStatus('thinking…');

      try {
        const res = await fetch('/api/chain-execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chainStateId, action }),
        });

        const data = await res.json();
        const result = data.result;

        if (!result) {
          appendMsg('ea', 'Something went wrong.');
          setStatus('ready');
          return;
        }

        // Render the engine result as a new EA message
        await renderChainResult(result);

      } catch {
        appendMsg('ea', 'Connection lost.');
      }

      setStatus('ready');
    }

    /**
     * Render a chain engine result object as one or more EA messages.
     * Handles nested `then` results recursively.
     */
    async function renderChainResult(result) {
      if (!result) return;

      if (result.status === 'actions') {
        if (result.message) {
          appendMsg('ea', result.message);
        }
        for (const action of (result.actions || [])) {
          if (action.url) {
            const el = appendMsg('ea', '');
            fireAction(action, el);
          }
        }
        if (result.then) {
          await renderChainResult(result.then);
        }
        return;
      }

      if (result.status === 'awaiting') {
        const el = appendMsg('ea', result.prompt || 'Continue?');
        renderChainControls(el, {
          chainStateId: result.chainStateId,
          skippable: result.skippable,
        }, result.prompt);
        return;
      }

      // completed, aborted, error — just show the message
      if (result.message) {
        appendMsg('ea', result.message);
      }
    }

    /**
     * Fire a deeplink or Siri Shortcut URL.
     * Opens via window.location to trigger iOS URL scheme handling.
     * Also renders a small action pill in the EA message for visibility.
     */
    function fireAction(action, eaEl) {
      const label = action.type === 'shortcut'
        ? `▷ ${action.name || 'Shortcut'}`
        : `↗ ${friendlyActionLabel(action.url)}`;

      const pill = document.createElement('a');
      pill.className    = 'action-pill';
      pill.textContent  = label;
      pill.href         = action.url;
      // On iOS, setting location.href triggers the URL scheme
      pill.onclick = (e) => {
        e.preventDefault();
        window.location.href = action.url;
      };

      eaEl.appendChild(pill);
      scrollBottom();

      // Auto-fire after a short delay to let the message render first
      setTimeout(() => {
        window.location.href = action.url;
      }, 300);
    }

    function friendlyActionLabel(url) {
      if (!url) return 'Action';
      if (url.startsWith('maps://'))      return 'Maps';
      if (url.startsWith('tel:'))         return 'Call';
      if (url.startsWith('facetime'))     return 'FaceTime';
      if (url.startsWith('sms:'))         return 'Messages';
      if (url.startsWith('spotify:'))     return 'Spotify';
      if (url.startsWith('shortcuts://')) return 'Shortcut';
      if (url.startsWith('clock-timer:'))  return 'Timer';
      if (url.startsWith('App-Prefs:'))   return 'Settings';
      return 'Open';
    }

    // --- Nav drawer ---
    (function() {
      var style = document.createElement('style');
      style.textContent = '.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.22s;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}.nav-overlay.open{opacity:1;pointer-events:all}.nav-drawer{position:fixed;top:0;right:0;bottom:0;width:68vw;max-width:260px;background:#141414;z-index:1001;transform:translateX(100%);transition:transform 0.26s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.08)}.nav-drawer.open{transform:translateX(0)}.nav-drawer-top{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between}.nav-drawer-label{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#555}.nav-x{background:none;border:none;color:#666;font-size:26px;line-height:1;cursor:pointer;padding:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent}.nav-list{padding:8px 0}.nav-link{display:block;padding:17px 22px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:400;color:#aaa;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}.nav-link.active{color:#f0f0f0;font-weight:600;border-left-color:#f0f0f0}';
      document.head.appendChild(style);

      var overlay = document.createElement('div');
      overlay.className = 'nav-overlay';
      overlay.addEventListener('click', function(){ navClose(); });

      var items = [
        { label: 'EA',       path: '/ea' },
        { label: 'Routines', path: '/chains' },
        { label: 'Log',      path: '/action-log' },
        { label: 'Settings', path: '/config' },
      ];
      var cur = window.location.pathname;

      var drawer = document.createElement('div');
      drawer.className = 'nav-drawer';
      drawer.innerHTML = '<div class="nav-drawer-top"><span class="nav-drawer-label">EA Watch</span><button class="nav-x" onclick="navClose()">×</button></div><div class="nav-list">' +
        items.map(function(item) {
          var active = cur === item.path || (item.path !== '/ea' && cur.indexOf(item.path) === 0);
          return '<a class="nav-link' + (active ? ' active' : '') + '" href="' + item.path + '">' + item.label + '</a>';
        }).join('') + '</div>';

      document.body.appendChild(overlay);
      document.body.appendChild(drawer);

      window.navOpen  = function() { overlay.classList.add('open'); drawer.classList.add('open'); document.body.style.overflow='hidden'; };
      window.navClose = function() { overlay.classList.remove('open'); drawer.classList.remove('open'); document.body.style.overflow=''; };
    })();
  </script>
<script src="/nav.js" defer></script>
