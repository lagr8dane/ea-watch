<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>EA</title>
  <script src="/shell-pref.js?v=1"></script>
  <link rel="stylesheet" href="/shell.css?v=3">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --surface2: #1c1c1c;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0f0f0;
      --muted:    #666;
      --hi:       #8ab4ff;
      --ea-msg:   #1c1c1c;
      --user-msg: #2a2a2a;
      /* Compose dock — high contrast vs #0a chat bg */
      --compose-bg:         #0e0e14;
      --compose-surface:    #18181f;
      --intent-pill-bg:     #26262f;
      --intent-pill-bg-hover: #2e2e3a;
      --intent-pill-text:   #f4f4f8;
      --intent-pill-icon:   #d8dce8;
      --intent-pill-edge:   rgba(255, 255, 255, 0.22);
    }

    html {
      height: 100%;
      background: var(--bg);
      overscroll-behavior: none;
    }

    body.has-app-shell {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(12px, env(safe-area-inset-top, 0px)) max(20px, env(safe-area-inset-right, 0px)) 12px max(20px, env(safe-area-inset-left, 0px));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ea-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .ea-status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a3;
    }

    .status-dot.shell {
      background: #a63;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      min-width: 44px;
      min-height: 44px;
      border-radius: 10px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }

    .icon-btn:active { color: var(--text); }

    .nav-menu-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-menu-btn .nav-menu-line {
      display: block;
      width: 20px;
      height: 1.5px;
      background: #888;
      border-radius: 1px;
    }

    .icon-btn:focus-visible,
    .nav-menu-btn:focus-visible,
    .send-btn:focus-visible,
    .voice-btn:focus-visible,
    .intent-pill:focus-visible,
    .intent-panel-option:focus-visible,
    .ea-chip:focus-visible,
    .action-pill:focus-visible,
    .chain-btn:focus-visible {
      outline: 2px solid var(--hi);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .typing-dot {
        animation: none !important;
        opacity: 0.45;
      }
      .voice-btn.listening {
        animation: none !important;
      }
      .intent-panel-sheet,
      .intent-panel-backdrop {
        transition: none !important;
      }
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px max(16px, env(safe-area-inset-left, 0px)) 20px max(16px, env(safe-area-inset-right, 0px));
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }

    @media (min-width: 560px) {
      .messages {
        padding-left: max(24px, env(safe-area-inset-left, 0px));
        padding-right: max(24px, env(safe-area-inset-right, 0px));
      }
    }

    /* EA message row — avatar + bubble (+ copy) */
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      align-self: flex-start;
      max-width: 92%;
    }

    .msg-row > .ea-msg-stack {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .ea-msg-stack > .mb-panel {
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    .ea-copy-wrap {
      padding: 0 2px;
    }

    .ea-copy-btn {
      background: none;
      border: none;
      padding: 2px 0;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .ea-copy-btn:hover { color: var(--hi); }
    .ea-copy-btn:active { opacity: 0.85; }

    .ea-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.8);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: clamp(15px, 2.4vw, 17px);
      line-height: 1.6;
    }

    .msg.ea {
      background: #1a1a24;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 4px;
      color: #ececf2;
      border-left: 2px solid rgba(120, 140, 220, 0.45);
    }

    .msg.user {
      background: #1e1e1e;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      color: var(--text);
      max-width: 82%;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .msg.ea.typing {
      display: flex;
      flex-direction: row;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── Bottom compose: intent bar + input ── */
    .ea-compose-stack {
      position: relative;
      flex-shrink: 0;
      z-index: 15;
      overflow: visible;
      background: var(--compose-bg);
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow:
        0 -1px 0 rgba(255, 255, 255, 0.06),
        0 -12px 40px rgba(0, 0, 0, 0.55);
    }

    /* Sheet lives in mount (z-index 1). Bar + input stay above so shadows / subpixels never clip pill icons. */
    .intent-panel-mount {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 100%;
      z-index: 1;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
      overflow: visible;
    }

    .intent-panel-mount.is-open {
      pointer-events: auto;
    }

    /* Must stay BELOW .intent-panel-sheet or taps hit the dimmer instead of options (z-index was 24 > sheet). */
    .intent-panel-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(0, 0, 0, 0.42);
      opacity: 0;
      transition: opacity 0.26s ease;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
    }

    .intent-panel-mount.is-open .intent-panel-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .intent-panel-sheet {
      position: relative;
      z-index: 3;
      max-height: min(46vh, 340px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--compose-surface);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      padding: 0 0 max(8px, env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -6px 28px rgba(0, 0, 0, 0.42);
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      margin-bottom: 0;
    }

    .intent-panel-mount.is-open .intent-panel-sheet {
      transform: translateY(0);
      margin-bottom: 18px;
    }

    .intent-panel-handle {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 0 2px;
      cursor: grab;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .intent-panel-handle span {
      display: block;
      width: 28px;
      height: 2.5px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.32);
    }

    .intent-panel-title {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      padding: 0 14px 5px;
      margin: 0;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .intent-panel-options {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
    }

    .intent-panel-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--intent-pill-bg);
      color: var(--intent-pill-text);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }

    .intent-panel-option:active {
      background: var(--intent-pill-bg-hover);
      transform: scale(0.99);
    }

    .intent-panel-option svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      stroke: var(--hi);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .intent-panel-option-main {
      flex: 1;
      min-width: 0;
    }

    .intent-panel-option-sub {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.52);
      line-height: 1.35;
    }

    .intent-bar {
      position: relative;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      padding: 7px max(10px, env(safe-area-inset-left, 0px)) 5px max(10px, env(safe-area-inset-right, 0px));
      background: var(--compose-surface);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      overflow: visible;
    }

    @media (min-width: 420px) {
      .intent-bar {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        padding-left: max(12px, env(safe-area-inset-left, 0px));
        padding-right: max(12px, env(safe-area-inset-right, 0px));
      }
    }

    .intent-pill {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 52px;
      padding: 8px 4px 7px;
      border-radius: 12px;
      overflow: visible;
      line-height: 1;
      border: 1px solid var(--intent-pill-edge);
      background: var(--intent-pill-bg);
      color: var(--intent-pill-text);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: -0.01em;
      line-height: 1.2;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    }

    .intent-pill svg {
      display: block;
      width: 20px;
      height: 20px;
      stroke: var(--intent-pill-icon);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      overflow: visible;
    }

    .intent-pill-label {
      display: block;
      max-width: 100%;
      text-align: center;
      line-height: 1.15;
      word-break: break-word;
      hyphens: auto;
    }

    .intent-pill:active {
      transform: scale(0.98);
      background: var(--intent-pill-bg-hover);
    }

    .intent-pill.intent-pill--active {
      border-color: rgba(138, 180, 255, 0.85);
      color: #f0f6ff;
      background: rgba(56, 88, 168, 0.42);
      box-shadow:
        0 0 0 1px rgba(138, 180, 255, 0.35),
        0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .intent-pill.intent-pill--active svg {
      stroke: #e8f0ff;
    }

    @media (min-width: 420px) {
      .intent-pill {
        min-height: 54px;
        font-size: 11px;
      }
    }

    /* Quick actions — under greeting (routine chips etc.) */
    .ea-quick-chips {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 100%;
      padding: 0 2px 4px;
    }

    .ea-chip {
      padding: 10px 16px;
      min-height: 44px;
      box-sizing: border-box;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #c8c8d8;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, border-color 0.12s;
    }

    .ea-chip:active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.18);
    }

    .ea-routine-chips {
      align-self: flex-start;
      max-width: 92%;
      margin: -4px 0 8px 38px;
    }

    .ea-chip-long {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ea-chip-routine {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      white-space: normal;
      max-width: min(100%, 260px);
      line-height: 1.25;
    }

    .ea-chip-routine .ea-chip-title {
      font-weight: 600;
      color: #dcdce8;
    }

    .ea-chip-routine .ea-chip-sub {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      word-break: break-word;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%            { opacity: 1; }
    }

    /* ── Morning briefing panels (/api/morning-briefing JSON) ── */
    .mb-wrap {
      align-self: stretch;
      max-width: 92%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 4px;
    }

    .mb-panel {
      background: #0d0d14;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    .mb-panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
      font-weight: 600;
      color: #c8c8d8;
      letter-spacing: 0.02em;
    }

    .mb-panel-icon { font-size: 18px; line-height: 1; }

    .mb-weather {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 16px 14px;
      background: linear-gradient(135deg, #0d1117 0%, #0d1929 100%);
    }

    .mb-weather-icon { font-size: 40px; line-height: 1; flex-shrink: 0; }

    .mb-weather-main { flex: 1; min-width: 0; }

    .mb-weather-loc {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .mb-temp { font-size: 32px; font-weight: 300; letter-spacing: -0.5px; line-height: 1; color: #eee; }
    .mb-sub { font-size: 13px; color: #889; margin-top: 4px; }
    .mb-stats { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 10px; font-size: 11px; color: #667; }
    .mb-pill {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(76, 175, 125, 0.15);
      border: 1px solid rgba(76, 175, 125, 0.3);
      color: #6c9;
    }

    .mb-news-list { padding: 0; }
    .mb-news-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .mb-news-item:last-child { border-bottom: none; }
    .mb-news-item:active { background: rgba(255,255,255,0.04); }
    .mb-news-body { flex: 1; min-width: 0; }
    .mb-news-title { font-size: 14px; line-height: 1.35; color: #dcdce8; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .mb-news-source { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #556; margin-top: 4px; }
    .mb-news-more { font-size: 18px; color: #445; flex-shrink: 0; }

    .mb-load-more {
      width: 100%;
      padding: 12px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      color: #889;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .mb-load-more:disabled { opacity: 0.5; }

    .mb-quote { padding: 14px 16px 16px; font-size: 14px; line-height: 1.5; color: #aab; font-style: italic; }

    .mb-task-body { padding: 4px 0 0; }
    .mb-task-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #667;
      padding: 12px 16px 6px;
    }
    .mb-task-section-title:first-child { padding-top: 6px; }
    .mb-task-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
      color: #dcdce8;
    }
    .mb-task-row:last-child { border-bottom: none; }
    .mb-task-pri { flex-shrink: 0; width: 14px; color: #f5a623; font-size: 12px; text-align: center; }
    .mb-task-title { flex: 1; min-width: 0; line-height: 1.35; word-break: break-word; }
    .mb-task-due { flex-shrink: 0; font-size: 11px; color: #667; white-space: nowrap; }
    .mb-task-empty { padding: 18px 16px 8px; font-size: 14px; color: #889; line-height: 1.45; }
    a.mb-task-foot {
      display: block;
      padding: 14px 16px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #7ab8ff;
      text-decoration: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      -webkit-tap-highlight-color: transparent;
    }
    a.mb-task-foot:active { opacity: 0.85; }

    .mb-mindful-body {
      padding: 14px 16px 16px;
      font-size: 14px;
      line-height: 1.55;
      color: #c8c8d8;
      white-space: pre-wrap;
    }

    .mb-tick-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    .mb-tick-row:last-of-type { border-bottom: none; }
    .mb-tick-sym { font-weight: 700; color: #dde; min-width: 56px; }
    .mb-tick-links { display: flex; gap: 12px; margin-left: auto; }
    .mb-tick-links a {
      font-size: 12px;
      color: #7ab8ff;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mb-explore-inner {
      display: block;
      padding: 12px 16px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #7ab8ff;
      text-decoration: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      -webkit-tap-highlight-color: transparent;
    }
    .mb-explore-inner:active { opacity: 0.85; }

    .mb-foot {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 16px 10px;
    }


    /* Input bar */
    .input-bar {
      position: relative;
      z-index: 6;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px max(16px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px));
      background: var(--compose-bg);
      flex-shrink: 0;
      overflow: visible;
    }

    @media (min-width: 560px) {
      .input-bar {
        padding-left: 20px;
        padding-right: 20px;
      }
    }

    .input-wrap {
      flex: 1;
      background: var(--compose-surface);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 10px 16px;
      gap: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap:focus-within {
      border-color: rgba(138, 180, 255, 0.45);
      box-shadow: 0 0 0 1px rgba(138, 180, 255, 0.2);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      -webkit-appearance: none;
    }

    textarea::placeholder { color: var(--muted); }

    .voice-btn {
      min-width: 44px;
      min-height: 44px;
      border-radius: 50%;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.62);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }

    .voice-btn.listening {
      color: #e05;
      animation: pulse-red 1s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .send-btn:not(:disabled):active { opacity: 0.8; }

    /* Chain control buttons — rendered inside an EA message bubble */
    .chain-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .chain-btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .chain-btn:active { opacity: 0.7; }

    .chain-btn-continue {
      background: var(--text);
      color: var(--bg);
    }
    .chain-btn-skip {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .chain-btn-stop {
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    /* EA assistant bubble: text slot + embedded chips (deeplinks) */
    .msg.ea:has(> .ea-stream-text) {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .ea-stream-text {
      white-space: pre-wrap;
      width: 100%;
    }

    /* Action pill — shown when a deeplink/shortcut fires */
    .action-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-sizing: border-box;
      min-height: 44px;
      padding: 8px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .action-pill:active {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .action-pill.action-pill-spotify {
      border-color: rgba(29, 185, 84, 0.45);
      background: rgba(29, 185, 84, 0.12);
      color: #b4f0c8;
    }
    .action-pill.action-pill-spotify:active {
      background: rgba(29, 185, 84, 0.2);
    }
    .action-pill.action-pill-timer {
      border-color: rgba(100, 180, 255, 0.45);
      background: rgba(100, 180, 255, 0.1);
      color: #b8d9ff;
    }
    .action-pill.action-pill-timer:active {
      background: rgba(100, 180, 255, 0.18);
    }
    .action-pill.action-pill-clock {
      border-color: rgba(255, 200, 120, 0.45);
      background: rgba(255, 200, 120, 0.1);
      color: #ffe0b0;
    }
    .action-pill.action-pill-clock:active {
      background: rgba(255, 200, 120, 0.18);
    }

    .ea-pending-bar {
      flex-shrink: 0;
      padding: 12px max(16px, env(safe-area-inset-right, 0px)) 12px max(16px, env(safe-area-inset-left, 0px));
      background: rgba(138, 180, 255, 0.08);
      border-bottom: 1px solid rgba(138, 180, 255, 0.22);
      font-size: 14px;
      line-height: 1.45;
      color: #c8d4ec;
    }
    .ea-pending-bar[hidden] {
      display: none !important;
    }
    .ea-pending-bar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .ea-pending-btn {
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ea-pending-btn-primary {
      background: var(--text);
      color: var(--bg);
    }
    .ea-pending-btn-primary:active { opacity: 0.88; }
    .ea-pending-btn-ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .ea-pending-btn-ghost:active { opacity: 0.85; }
  </style>
</head>
<body class="has-app-shell">

  <div class="app-shell">
  <header>
    <div>
      <div class="ea-name">EA</div>
      <div class="ea-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">ready</span>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" class="icon-btn" onclick="clearChat()" title="Clear" aria-label="Clear chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
        </svg>
      </button>
      <button type="button" class="nav-menu-btn" onclick="navOpen()" aria-label="Open menu">
        <span class="nav-menu-line" aria-hidden="true"></span>
        <span class="nav-menu-line" aria-hidden="true"></span>
        <span class="nav-menu-line" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div id="ea-pending-bar" class="ea-pending-bar" role="region" aria-label="Queued from another device" hidden>
    <div id="ea-pending-text"></div>
    <div class="ea-pending-bar-actions">
      <button type="button" class="ea-pending-btn ea-pending-btn-primary" id="ea-pending-continue">Continue</button>
      <button type="button" class="ea-pending-btn ea-pending-btn-ghost" id="ea-pending-dismiss">Dismiss</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="ea-compose-stack" id="ea-compose-stack">
    <div class="intent-panel-mount" id="intent-panel-mount" aria-hidden="true">
      <div class="intent-panel-backdrop" id="intent-panel-backdrop" tabindex="-1" aria-hidden="true"></div>
      <div class="intent-panel-sheet" id="intent-panel-sheet" role="dialog" aria-modal="true" aria-labelledby="intent-panel-title" hidden>
        <div class="intent-panel-handle" id="intent-panel-handle" aria-hidden="true"><span></span></div>
        <h2 class="intent-panel-title" id="intent-panel-title"></h2>
        <div class="intent-panel-options" id="intent-panel-options"></div>
      </div>
    </div>
    <nav class="intent-bar" id="intent-bar" aria-label="Intents"></nav>
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Message EA…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button type="button" class="voice-btn" id="voice-btn" onclick="toggleVoice()" title="Voice input" aria-label="Voice input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/>
        </svg>
      </button>
    </div>
    <button type="button" class="send-btn" id="send-btn" onclick="send()" disabled aria-label="Send message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>
  </div>
  </div>
  </div>

  <script>
    const params   = new URLSearchParams(location.search);
    const isShell  = params.get('shell') === '1';
    const urlDebug = params.get('debug') === '1' || params.get('debug') === 'true';
    function mbQs() {
      const qs = new URLSearchParams();
      if (urlDebug) qs.set('debug', '1');
      return qs;
    }
    const messages = [];
    let   isTyping = false;
    let   recognition = null;
    let   userLat = null;
    let   userLon = null;

    // Request location silently — used for weather briefings
    // Cached in sessionStorage so we only ask once per session
    function requestLocation() {
      if (!navigator.geolocation) return;

      // Use cached coords if available
      const cached = sessionStorage.getItem('ea_location');
      if (cached) {
        try {
          const { lat, lon } = JSON.parse(cached);
          userLat = lat;
          userLon = lon;
          return;
        } catch {}
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          sessionStorage.setItem('ea_location', JSON.stringify({ lat: userLat, lon: userLon }));
        },
        () => {} // Fail silently — server falls back to Reno coords
      );
    }

    // Shell mode indicator
    if (isShell) {
      document.getElementById('status-dot').classList.add('shell');
      document.getElementById('status-text').textContent = 'active';
    }

    let ownerFirstName = null;
    let pendingHandoff = null;

    async function refreshPendingHandoff() {
      const bar = document.getElementById('ea-pending-bar');
      const textEl = document.getElementById('ea-pending-text');
      if (!bar || !textEl) return;
      try {
        const res = await fetch('/api/pending-command', { credentials: 'same-origin' });
        if (res.status === 401) return;
        if (!res.ok) return;
        const data = await res.json();
        if (!data.pending) {
          pendingHandoff = null;
          bar.hidden = true;
          return;
        }
        pendingHandoff = data.pending;
        const target = data.pending.target_surface === 'phone' ? 'your phone' : 'this device';
        textEl.textContent =
          `Something was queued for ${target} (from another session): ${data.pending.summary}`;
        bar.hidden = false;
      } catch {
        /* offline */
      }
    }

    function applyPendingToInput() {
      if (!pendingHandoff || !pendingHandoff.payload) return;
      const p = pendingHandoff.payload;
      const input = document.getElementById('input');
      if (p.kind === 'chat_send') input.value = p.text;
      else if (p.kind === 'routine_trigger') input.value = p.trigger;
      else if (p.kind === 'spotify_play') input.value = 'play ' + p.query;
      autoResize(input);
      input.dispatchEvent(new Event('input'));
      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = !input.value.trim();
    }

    async function clearPendingOnServer() {
      try {
        await fetch('/api/pending-command', { method: 'DELETE', credentials: 'same-origin' });
      } catch {}
      pendingHandoff = null;
      const bar = document.getElementById('ea-pending-bar');
      if (bar) bar.hidden = true;
    }

    document.getElementById('ea-pending-continue')?.addEventListener('click', async () => {
      applyPendingToInput();
      await clearPendingOnServer();
      document.getElementById('input')?.focus();
    });
    document.getElementById('ea-pending-dismiss')?.addEventListener('click', () => clearPendingOnServer());

    // Fetch owner name for personalised greeting
    async function loadOwnerName() {
      try {
        const res = await fetch('/api/config/public');
        if (res.ok) {
          const c = await res.json();
          if (c.display_name) {
            ownerFirstName = c.display_name.split(' ')[0];
          }
        }
      } catch {}
    }

    const AIS_STORAGE_KEY = 'ea_ais_v1';

    function setActiveIntentSession(intentKey) {
      try {
        sessionStorage.setItem(
          AIS_STORAGE_KEY,
          JSON.stringify({ intent: intentKey, ts: Date.now() })
        );
      } catch (_) {}
    }

    function goInterestRadar(opts) {
      opts = opts || {};
      const qs = new URLSearchParams({ auto: '1', when: opts.when || 'tonight' });
      if (opts.kind) qs.set('kind', opts.kind);
      if (urlDebug) qs.set('debug', '1');
      window.location.href = '/interest-radar?' + qs.toString();
    }

    /** Bottom intent bar + sheet (UI only). */
    const intentUi = {
      activeIntent: null,
      panelOpen: false,
      panelType: null,
      closeTimer: null,
    };

    const INTENT_SVG = {
      do: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
      explore:
        '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8l2.2 6.5L12 17l-2.2-2.5L12 8z"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/></svg>',
      plan: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
      reset:
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>',
      now: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    };

    function intentBarHighlight(id) {
      intentUi.activeIntent = id;
      document.querySelectorAll('.intent-pill').forEach((btn) => {
        const on = id != null && btn.getAttribute('data-intent') === id;
        btn.classList.toggle('intent-pill--active', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    }

    function getIntentPanelEls() {
      return {
        mount: document.getElementById('intent-panel-mount'),
        backdrop: document.getElementById('intent-panel-backdrop'),
        sheet: document.getElementById('intent-panel-sheet'),
        title: document.getElementById('intent-panel-title'),
        options: document.getElementById('intent-panel-options'),
        handle: document.getElementById('intent-panel-handle'),
      };
    }

    function purgeIntentPanelContent() {
      const { title, options } = getIntentPanelEls();
      if (title) title.textContent = '';
      if (options) options.innerHTML = '';
    }

    /**
     * @param {object} [opts]
     * @param {boolean} [opts.immediate] Skip slide animation; use after picking an option or switching intents.
     * @param {boolean} [opts.clearHighlight] Clear pill selection (default true). False when about to open another panel.
     */
    function closeIntentPanel(opts) {
      opts = opts || {};
      const immediate = !!opts.immediate;
      const clearHighlight = opts.clearHighlight !== false;
      const { mount, sheet } = getIntentPanelEls();
      if (!mount || !sheet) return;

      if (intentUi.closeTimer) {
        clearTimeout(intentUi.closeTimer);
        intentUi.closeTimer = null;
      }

      if (!intentUi.panelOpen) {
        if (immediate) {
          purgeIntentPanelContent();
          sheet.setAttribute('hidden', '');
        }
        if (clearHighlight) intentBarHighlight(null);
        return;
      }

      intentUi.panelOpen = false;
      intentUi.panelType = null;
      mount.classList.remove('is-open');
      mount.setAttribute('aria-hidden', 'true');

      if (immediate) {
        purgeIntentPanelContent();
        sheet.setAttribute('hidden', '');
        if (clearHighlight) intentBarHighlight(null);
        return;
      }

      const reduce =
        typeof window.matchMedia === 'function' &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) {
        purgeIntentPanelContent();
        sheet.setAttribute('hidden', '');
        if (clearHighlight) intentBarHighlight(null);
        return;
      }

      let settled = false;
      const once = () => {
        if (settled) return;
        settled = true;
        if (!intentUi.panelOpen) {
          purgeIntentPanelContent();
          sheet.setAttribute('hidden', '');
        }
        intentUi.closeTimer = null;
        if (clearHighlight && !intentUi.panelOpen) intentBarHighlight(null);
      };
      sheet.addEventListener('transitionend', once, { once: true });
      intentUi.closeTimer = setTimeout(once, 380);
    }

    function openIntentPanel(type) {
      const { mount, sheet, title, options } = getIntentPanelEls();
      if (!mount || !sheet || !title || !options) return;
      const panels = {
        do: {
          title: 'Do',
          rows: [
            { label: 'Focus', sub: 'Routines', action: () => sendChipMessage('routines') },
            { label: 'Quick task', sub: 'Add a task', action: () => sendChipMessage('remind me to follow up') },
            { label: 'Start timer', sub: '10 minutes', action: () => sendChipMessage('set a timer for 10 minutes') },
            { label: 'Run a routine', sub: 'Pick from list', action: () => sendChipMessage('routines') },
          ],
        },
        plan: {
          title: 'Plan',
          rows: [
            { label: 'Plan a trip', sub: 'Chat with EA', action: () => sendChipMessage('help me plan a trip') },
            { label: 'Plan something later', sub: 'Schedule ahead', action: () => sendChipMessage('help me plan something for later this week') },
            { label: 'Organize tasks', sub: 'Your list', action: () => sendChipMessage('my tasks') },
          ],
        },
        explore: {
          title: 'Explore',
          rows: [
            {
              label: 'Nearby',
              sub: 'Places radar',
              action: () =>
                isShell
                  ? sendChipMessage('inspire me')
                  : goInterestRadar({ when: 'tonight', kind: 'places' }),
            },
            {
              label: 'Later today',
              sub: 'Ideas for tonight',
              action: () =>
                isShell ? sendChipMessage('inspire me') : goInterestRadar({ when: 'tonight', kind: 'ideas' }),
            },
            {
              label: 'This week',
              sub: 'Broader window',
              action: () =>
                isShell ? sendChipMessage('inspire me') : goInterestRadar({ when: 'week', kind: 'ideas' }),
            },
          ],
        },
      };
      const spec = panels[type];
      if (!spec) return;

      if (intentUi.closeTimer) {
        clearTimeout(intentUi.closeTimer);
        intentUi.closeTimer = null;
      }

      const wasOpen = intentUi.panelOpen;
      intentUi.panelType = type;
      intentUi.panelOpen = true;
      title.textContent = spec.title;
      options.innerHTML = '';
      for (const row of spec.rows) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'intent-panel-option';
        const main = document.createElement('span');
        main.className = 'intent-panel-option-main';
        const t = document.createElement('span');
        t.style.display = 'block';
        t.textContent = row.label;
        main.appendChild(t);
        if (row.sub) {
          const s = document.createElement('span');
          s.className = 'intent-panel-option-sub';
          s.textContent = row.sub;
          main.appendChild(s);
        }
        btn.appendChild(main);
        btn.addEventListener('click', () => {
          closeIntentPanel({ immediate: true, clearHighlight: true });
          row.action();
        });
        options.appendChild(btn);
      }

      if (!wasOpen) {
        sheet.removeAttribute('hidden');
        mount.setAttribute('aria-hidden', 'false');
        requestAnimationFrame(() => mount.classList.add('is-open'));
      }
      const first = options.querySelector('.intent-panel-option');
      if (first) first.focus();
    }

    function onIntentBarTap(intentId) {
      if (isTyping) return;

      const panelKey = intentId === 'do' || intentId === 'plan' || intentId === 'explore' ? intentId : null;

      if (panelKey && intentUi.panelOpen && intentUi.panelType === panelKey) {
        closeIntentPanel({ immediate: true, clearHighlight: true });
        return;
      }

      setActiveIntentSession(intentId);

      if (intentId === 'reset' || intentId === 'now') {
        closeIntentPanel({ immediate: true, clearHighlight: true });
        if (intentId === 'reset') sendChipMessage('mindful moment');
        else sendChipMessage('morning briefing');
        return;
      }

      if (panelKey) {
        if (intentUi.panelOpen) {
          closeIntentPanel({ immediate: true, clearHighlight: false });
        }
        intentBarHighlight(intentId);
        openIntentPanel(panelKey);
      }
    }

    function wireIntentBar() {
      const bar = document.getElementById('intent-bar');
      if (!bar || bar.dataset.wired === '1') return;
      bar.dataset.wired = '1';
      const defs = [
        { id: 'do', label: 'Do' },
        { id: 'explore', label: 'Explore' },
        { id: 'plan', label: 'Plan' },
        { id: 'reset', label: 'Reset' },
        { id: 'now', label: 'Now' },
      ];
      for (const d of defs) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'intent-pill';
        btn.setAttribute('data-intent', d.id);
        btn.setAttribute('aria-pressed', 'false');
        btn.setAttribute('aria-label', d.label);
        btn.innerHTML =
          (INTENT_SVG[d.id] || '') + '<span class="intent-pill-label">' + d.label + '</span>';
        btn.addEventListener('click', () => onIntentBarTap(d.id));
        bar.appendChild(btn);
      }

      const { backdrop, handle, sheet } = getIntentPanelEls();
      backdrop?.addEventListener('click', () => closeIntentPanel());

      let sy = 0;
      let pulling = false;
      handle?.addEventListener('touchstart', (e) => {
        pulling = true;
        sy = e.touches[0].clientY;
      });
      handle?.addEventListener('touchmove', (e) => {
        if (!pulling || !intentUi.panelOpen) return;
        const y = e.touches[0].clientY;
        if (y - sy > 56) {
          pulling = false;
          closeIntentPanel();
        }
      });
      handle?.addEventListener('touchend', () => {
        pulling = false;
      });

      document.addEventListener('keydown', (e) => {

    /** Deterministic text → route key (null = pass through to /api/ea). */
    function classifyIntentFromText(raw) {
      const lower = String(raw || '')
        .trim()
        .toLowerCase();
      const skip = new Set([
        'inspire me',
        'morning briefing',
        'mindful moment',
        'my tasks',
        'routines',
      ]);
      if (skip.has(lower)) return null;
      if (lower.includes('inspire')) return 'explore_inspire';
      if (
        lower.includes("what's going on") ||
        lower.includes('whats going on') ||
        lower.includes('what’s going on') ||
        /\bnews\b/.test(lower) ||
        /\bweather\b/.test(lower)
      ) {
        return 'now';
      }
      if (/\bbreak\b|\breset\b/.test(lower)) return 'reset';
      if (/\bplan\b|\borganize\b/.test(lower)) return 'plan';
      if (/\bidea\b|\bwhere\b|\bfind\b/.test(lower)) return 'explore_nav';
      if (/\bfocus\b|\btimer\b|\bdo\b/.test(lower)) return null;
      return null;
    }

    /** Chips under an EA reply — tap sends `trigger` as the next user message. */
    function appendRoutineChips(afterRow, items) {
      if (!afterRow || !items || !items.length) return;
      const parent = afterRow.parentNode;
      if (!parent) return;
      const bar = document.createElement('div');
      bar.className = 'ea-quick-chips ea-routine-chips';
      bar.setAttribute('role', 'toolbar');
      bar.setAttribute('aria-label', 'Your routines');
      for (const c of items) {
        const trigger = c.trigger != null ? String(c.trigger) : '';
        if (!trigger) continue;
        const btn = document.createElement('button');
        btn.type = 'button';
        const label = (c.label != null && String(c.label).trim()) || trigger;
        const sub = c.subtitle != null ? String(c.subtitle).trim() : '';
        btn.title = sub ? `Say: ${sub}` : `Say: ${trigger}`;
        if (sub) {
          btn.className = 'ea-chip ea-chip-routine';
          const titleSpan = document.createElement('span');
          titleSpan.className = 'ea-chip-title';
          titleSpan.textContent = label;
          const subSpan = document.createElement('span');
          subSpan.className = 'ea-chip-sub';
          subSpan.textContent = 'Say: ' + sub;
          btn.appendChild(titleSpan);
          btn.appendChild(subSpan);
        } else {
          btn.className = 'ea-chip ea-chip-long';
          btn.textContent = label;
        }
        btn.addEventListener('click', () => sendChipMessage(trigger));
        bar.appendChild(btn);
      }
      if (!bar.children.length) return;
      parent.insertBefore(bar, afterRow.nextSibling);
      scrollBottom();
    }

    async function copyPlainTextToClipboard(text, btn) {
      const t = (text || '').trim();
      const label = btn.getAttribute('data-copy-label') || 'Copy';
      if (!t) {
        btn.textContent = 'Nothing to copy';
        setTimeout(() => { btn.textContent = label; }, 1400);
        return;
      }
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(t);
        } else {
          const ta = document.createElement('textarea');
          ta.value = t;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = label; }, 1600);
      } catch {
        btn.textContent = 'Copy failed';
        setTimeout(() => { btn.textContent = label; }, 1600);
      }
    }

    function weatherEmoji(condition) {
      if (!condition) return '🌤';
      const c = condition.toLowerCase();
      if (c.includes('clear'))      return '☀️';
      if (c.includes('partly'))     return '⛅️';
      if (c.includes('overcast'))   return '☁️';
      if (c.includes('fog'))        return '🌫';
      if (c.includes('drizzle'))    return '🌦';
      if (c.includes('rain'))       return '🌧';
      if (c.includes('snow'))       return '❄️';
      if (c.includes('thunder'))    return '⛈';
      return '🌤';
    }

    /** Routines list (and similar) stash `{ kind, trigger }` here before navigating to /ea */
    const EA_COMPOSE_PREFILL_KEY = 'ea_compose_prefill';

    function consumeComposePrefill() {
      try {
        const raw = sessionStorage.getItem(EA_COMPOSE_PREFILL_KEY);
        if (!raw) return;
        sessionStorage.removeItem(EA_COMPOSE_PREFILL_KEY);
        const data = JSON.parse(raw);
        if (data.kind !== 'routine_trigger' || typeof data.trigger !== 'string') return;
        const input = document.getElementById('input');
        if (!input) return;
        const t = data.trigger.trim();
        if (!t) return;
        input.value = t;
        autoResize(input);
        input.focus();
      } catch {}
    }

    // --- Send ---

    async function send(opts) {
      opts = opts || {};
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || isTyping) return;

      if (!opts.skipClassify) {
        const cls = classifyIntentFromText(text);
        if (cls === 'explore_nav') {
          input.value = '';
          input.style.height = 'auto';
          document.getElementById('send-btn').disabled = true;
          setActiveIntentSession('explore');
          if (isShell) {
            input.value = 'inspire me';
            autoResize(input);
            document.getElementById('send-btn').disabled = !input.value.trim();
            return send({ skipClassify: true });
          }
          goInterestRadar({ when: 'tonight' });
          return;
        }
        const routeLiteral = {
          now: 'morning briefing',
          reset: 'mindful moment',
          plan: 'my tasks',
          explore_inspire: 'inspire me',
        };
        if (routeLiteral[cls]) {
          setActiveIntentSession(
            cls === 'explore_inspire' ? 'explore' : cls === 'now' ? 'now' : cls
          );
          input.value = routeLiteral[cls];
          autoResize(input);
          return send({ skipClassify: true });
        }
        setActiveIntentSession('do');
      }

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      appendMsg('user', text);
      messages.push({ role: 'user', content: text });

      isTyping = true;
      setStatus('thinking…');
      showTyping();

      try {
        const res = await fetch('/api/ea', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages,
            shell: isShell,
            lat: userLat,
            lon: userLon,
            localHour: new Date().getHours(),
            debug: urlDebug,
          }),
        });

        hideTyping();

        if (!res.ok) {
          const errMsg =
            res.status === 401
              ? 'Your session expired. Tap your watch again to sign in, then come back to EA.'
              : 'Something went wrong. Try again.';
          appendMsg('ea', errMsg);
          isTyping = false;
          setStatus('ready');
          return;
        }

        // Stream response
        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   eaEl    = appendMsg('ea', '');
        let   streamTextEl = eaEl.querySelector('.ea-stream-text') || eaEl;
        let   full    = '';
        let   pendingActions  = [];
        let   chainControl    = null;
        let   sseBuffer       = '';
        let   hadMorningBriefing = false;
        let   hadMindfulPanel    = false;
        let   hadRoutineChips    = false;
        let   hadTaskPanel       = false;
        let   panelFetchKind     = null;

        setStatus('responding…');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          sseBuffer += chunk;

          // Process complete lines only
          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop(); // keep incomplete last line in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);

              if (parsed.mindful_panel) {
                hadMindfulPanel = true;
                const bubble = streamTextEl.closest('.msg.ea') || streamTextEl;
                streamTextEl = mountMindfulPanel(bubble, parsed.mindful_panel);
                eaEl = streamTextEl;
              }

              if (parsed.task_panel) {
                hadTaskPanel = true;
                const bubble = streamTextEl.closest('.msg.ea') || streamTextEl;
                const panel = mountTaskPanel(bubble, parsed.task_panel);
                streamTextEl = panel;
                eaEl = panel;
              }

              // Text delta — stream into current message bubble (or mindful panel body)
              if (parsed.delta?.text) {
                full += parsed.delta.text;
                streamTextEl.textContent = full;
                scrollBottom();
              }

              // new_bubble — start a fresh EA message for next section
              if (parsed.new_bubble) {
                messages.push({ role: 'assistant', content: full });
                full = '';
                eaEl = appendMsg('ea', '');
                streamTextEl = eaEl.querySelector('.ea-stream-text') || eaEl;
              }

              // Actions and chain control
              if (parsed.actions) pendingActions = parsed.actions;
              if (parsed.chain_control) chainControl = parsed.chain_control;

              // Morning briefing — one JSON fetch, panel UI (no SSE layout)
              if (parsed.morning_briefing) {
                hadMorningBriefing = true;
                setTimeout(() => runMorningBriefingUI(), 0);
              }

              if (parsed.briefing_panels_fetch?.sections) {
                panelFetchKind = parsed.briefing_panels_fetch.sections;
                setTimeout(() => runBriefingPanelsFetch(panelFetchKind), 0);
              }

              if (parsed.routine_chips && Array.isArray(parsed.routine_chips)) {
                hadRoutineChips = true;
                const row = streamTextEl.closest('.msg-row');
                appendRoutineChips(row, parsed.routine_chips);
              }
            } catch {}
          }
        }

        // Remove empty EA bubble / panel if nothing was streamed into it
        if (streamTextEl && !full && !hadTaskPanel && !hadMindfulPanel) {
          streamTextEl.closest('.msg-row')?.remove();
        }

        // Fire any pending OS actions (deeplinks / Siri Shortcuts)
        for (const action of pendingActions) {
          if (action.url) {
            fireAction(action, streamTextEl || eaEl);
          }
        }

        // Render chain control buttons if we're awaiting a confirmable step
        if (chainControl) {
          renderChainControls(eaEl, chainControl, full);
        }

        let assistantTranscript = full;
        if (hadMorningBriefing) assistantTranscript = '(Morning briefing)';
        else if (hadMindfulPanel) assistantTranscript = '(Mindful moment)';
        else if (hadTaskPanel) assistantTranscript = '(Tasks)';
        else if (hadRoutineChips) assistantTranscript = '(Routines)';
        else if (panelFetchKind === 'weather') assistantTranscript = '(Weather)';
        else if (panelFetchKind === 'news') assistantTranscript = '(Headlines)';

        messages.push({
          role: 'assistant',
          content: assistantTranscript,
        });
        setStatus('ready');
      } catch (e) {
        hideTyping();
        appendMsg('ea', 'Connection lost. Try again.');
        setStatus('ready');
      }

      isTyping = false;
      input.focus();
    }

    function setStatus(text) {
      document.getElementById('status-text').textContent = text;
    }

    // --- Voice input (Web Speech API) ---

    function toggleVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        appendMsg('ea', 'Voice input isn\'t supported on this browser. Try Chrome or Safari.');
        return;
      }

      if (recognition) {
        recognition.stop();
        recognition = null;
        document.getElementById('voice-btn').classList.remove('listening');
        return;
      }

      const SR = window.SpeechRecognition ?? window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous      = false;
      recognition.interimResults  = true;
      recognition.lang            = 'en-US';

      document.getElementById('voice-btn').classList.add('listening');
      setStatus('listening…');

      recognition.onresult = (e) => {
        const transcript = Array.from(e.results)
          .map(r => r[0].transcript)
          .join('');
        document.getElementById('input').value = transcript;
        document.getElementById('send-btn').disabled = !transcript.trim();
      };

      recognition.onend = () => {
        document.getElementById('voice-btn').classList.remove('listening');
        recognition = null;
        setStatus('ready');
        // Auto-send if we got something
        const val = document.getElementById('input').value.trim();
        if (val) send();
      };

      recognition.onerror = () => {
        document.getElementById('voice-btn').classList.remove('listening');
        recognition = null;
        setStatus('ready');
      };

      recognition.start();
    }

    // --- Chain controls ---

    /**
     * Render Continue / Skip / Stop buttons inside an EA message bubble.
     * Called after a confirmable or required step pauses the chain.
     */
    function renderChainControls(eaEl, control, promptText) {
      const { chainStateId, skippable } = control;

      const wrap = document.createElement('div');
      wrap.className = 'chain-controls';

      const continueBtn = document.createElement('button');
      continueBtn.className = 'chain-btn chain-btn-continue';
      continueBtn.textContent = 'Continue';
      continueBtn.onclick = () => resolveChain(chainStateId, 'continue', eaEl, wrap);
      wrap.appendChild(continueBtn);

      if (skippable) {
        const skipBtn = document.createElement('button');
        skipBtn.className = 'chain-btn chain-btn-skip';
        skipBtn.textContent = 'Skip this step';
        skipBtn.onclick = () => resolveChain(chainStateId, 'skip', eaEl, wrap);
        wrap.appendChild(skipBtn);
      }

      const stopBtn = document.createElement('button');
      stopBtn.className = 'chain-btn chain-btn-stop';
      stopBtn.textContent = 'Stop chain';
      stopBtn.onclick = () => resolveChain(chainStateId, 'abort', eaEl, wrap);
      wrap.appendChild(stopBtn);

      const mount = deeplinkMessageMount(eaEl);
      (mount || eaEl).appendChild(wrap);
      scrollBottom();
    }

    /**
     * Call /api/chain-execute with the user's choice, then render the result.
     */
    async function resolveChain(chainStateId, action, eaEl, controlWrap) {
      // Remove buttons immediately — prevent double-tap
      controlWrap.remove();
      setStatus('thinking…');

      try {
        const res = await fetch('/api/chain-execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chainStateId, action }),
        });

        const data = await res.json();
        const result = data.result;

        if (!result) {
          appendMsg('ea', 'Something went wrong.');
          setStatus('ready');
          return;
        }

        // Render the engine result as a new EA message
        await renderChainResult(result);

      } catch {
        appendMsg('ea', 'Connection lost.');
      }

      setStatus('ready');
    }

    /**
     * Render a chain engine result object as one or more EA messages.
     * Handles nested `then` results recursively.
     */
    async function renderChainResult(result) {
      if (!result) return;

      if (result.status === 'actions') {
        if (result.message) {
          appendMsg('ea', result.message);
        }
        for (const action of (result.actions || [])) {
          if (action.url) {
            const el = appendMsg('ea', '');
            fireAction(action, el);
          }
        }
        if (result.then) {
          await renderChainResult(result.then);
        }
        return;
      }

      if (result.status === 'awaiting') {
        const el = appendMsg('ea', result.prompt || 'Continue?');
        renderChainControls(el, {
          chainStateId: result.chainStateId,
          skippable: result.skippable,
        }, result.prompt);
        return;
      }

      // completed, aborted, error — just show the message
      if (result.message) {
        appendMsg('ea', result.message);
      }
    }

    /** Bubble or panel root to attach deeplink chips (keeps chip inside the same message as streamed text). */
    function deeplinkMessageMount(anchorEl) {
      if (!anchorEl) return null;
      const msg = anchorEl.closest?.('.msg.ea');
      if (msg) return msg;
      return anchorEl.closest?.('.mb-panel') || anchorEl;
    }

    /**
     * Fire a deeplink or Siri Shortcut URL.
     * Renders a chip inside the EA message. Optional `action.embed`: show chip only, do not auto-navigate.
     */
    function fireAction(action, anchorEl) {
      const mount = deeplinkMessageMount(anchorEl);
      const label = action.label
        ? action.label
        : action.type === 'shortcut'
          ? `▷ ${action.name || 'Shortcut'}`
          : friendlyActionLabel(action.url);

      const pill = document.createElement('a');
      pill.className = 'action-pill';
      if (action.pillClass) pill.classList.add(action.pillClass);
      pill.textContent = label;
      pill.href = action.url;
      pill.onclick = (e) => {
        e.preventDefault();
        window.location.href = action.url;
      };

      if (mount) mount.appendChild(pill);
      scrollBottom();

      if (!action.embed) {
        setTimeout(() => {
          window.location.href = action.url;
        }, 300);
      }
    }

    function friendlyActionLabel(url) {
      if (!url) return 'Action';
      if (url.startsWith('maps://'))      return 'Maps';
      if (url.startsWith('tel:'))         return 'Call';
      if (url.startsWith('facetime'))     return 'FaceTime';
      if (url.startsWith('sms:'))         return 'Messages';
      if (url.startsWith('spotify:')) return 'Open in Spotify';
      if (url.includes('/api/spotify/login')) return 'Connect Spotify';
      if (url.startsWith('https://open.spotify.com')) return 'Open in Spotify';
      if (url.startsWith('shortcuts://')) return 'Shortcut';
      if (url.startsWith('clock-timer:'))  return 'Timer';
      if (url.startsWith('clock-alarm:'))  return 'Clock';
      if (url.startsWith('App-Prefs:'))   return 'Settings';
      return 'Open';
    }

    // --- Nav drawer ---
    (function() {
      var style = document.createElement('style');
      style.textContent = '.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:10040;opacity:0;pointer-events:none;transition:opacity 0.22s;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}.nav-overlay.open{opacity:1;pointer-events:auto}.nav-drawer{position:fixed;top:0;right:0;bottom:0;width:68vw;max-width:260px;background:#141414;z-index:10050;transform:translateX(100%);transition:transform 0.26s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.08);padding-top:env(safe-area-inset-top)}.nav-drawer.open{transform:translateX(0)}.nav-drawer-top{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between}.nav-drawer-label{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#555}.nav-x{background:none;border:none;color:#aaa;font-size:28px;line-height:1;cursor:pointer;padding:8px 12px;margin:-8px -8px -8px 0;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.nav-list{padding:8px 0;flex:1}.nav-drawer-legal{border-top:1px solid rgba(255,255,255,0.07);padding:6px 0 calc(12px + env(safe-area-inset-bottom));flex-shrink:0}.nav-link-legal{display:block;padding:12px 22px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;font-weight:400;color:#666;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}.nav-link-legal.active{color:#aaa;font-weight:600;border-left-color:#555}.nav-link{display:block;padding:17px 22px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:400;color:#aaa;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}.nav-link.active{color:#f0f0f0;font-weight:600;border-left-color:#f0f0f0}';
      document.head.appendChild(style);

      var overlay = document.createElement('div');
      overlay.className = 'nav-overlay';

      var items = [
        { label: 'EA',       path: '/ea' },
        { label: 'Tasks',    path: '/tasks' },
        { label: 'Radar',    path: '/interest-radar' },
        { label: 'Routines', path: '/chains' },
        { label: 'Log',      path: '/action-log' },
        { label: 'Settings', path: '/config' },
      ];
      var legal = [
        { label: 'Privacy', path: '/privacy' },
        { label: 'Terms',   path: '/terms' },
      ];
      var cur = window.location.pathname;
      var dq = urlDebug ? '?debug=1' : '';

      var drawer = document.createElement('div');
      drawer.className = 'nav-drawer';
      drawer.innerHTML = '<div class="nav-drawer-top"><span class="nav-drawer-label">EA Watch</span><button type="button" class="nav-x" aria-label="Close menu">×</button></div><div class="nav-list">' +
        items.map(function(item) {
          var active = cur === item.path || (item.path !== '/ea' && cur.indexOf(item.path) === 0);
          return '<a class="nav-link' + (active ? ' active' : '') + '" href="' + item.path + dq + '">' + item.label + '</a>';
        }).join('') + '</div><div class="nav-drawer-legal" role="navigation" aria-label="Legal">' +
        legal.map(function(item) {
          var la = cur === item.path;
          return '<a class="nav-link-legal' + (la ? ' active' : '') + '" href="' + item.path + '">' + item.label + '</a>';
        }).join('') + '</div>';

      function closeNav() {
        overlay.classList.remove('open');
        drawer.classList.remove('open');
        document.body.style.overflow = '';
      }
      function openNav() {
        overlay.classList.add('open');
        drawer.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      overlay.addEventListener('click', closeNav);
      drawer.addEventListener('click', function(e) { e.stopPropagation(); });
      drawer.querySelector('.nav-x').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        closeNav();
      });

      document.body.appendChild(overlay);
      document.body.appendChild(drawer);

      window.navOpen  = openNav;
      window.navClose = closeNav;
    })();
  </script>
  <script src="/legal-footer.js?v=3" defer></script>
