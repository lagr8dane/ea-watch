<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Marco Rota</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   rgba(255,255,255,0.08);
      --text:     #f0f0f0;
      --muted:    #888;
      --accent:   #f0f0f0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Identity */
    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -1px;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .title {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      background: #1e1e1e;
      border-color: rgba(255,255,255,0.14);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
    }

    .btn-label {
      flex: 1;
    }

    .btn-label span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .btn-chevron {
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Icon colors */
    .icon-linkedin  { background: #0A66C2; }
    .icon-calendar  { background: #1a1a1a; border: 1px solid var(--border); }
    .icon-message   { background: #1a7f37; }
    .icon-whatsapp  { background: #25D366; }

    /* Bio */
    .bio {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      padding: 0 8px;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="identity">
      <div class="avatar" id="avatar"><span id="avatar-initials">MR</span></div>
      <div>
        <div class="name" id="display-name">Marco Rota</div>
        <div class="title" id="display-title">Technology Executive</div>
      </div>
    </div>

    <p class="bio" id="display-bio" style="display:none"></p>

    <div class="actions">

      <!-- LinkedIn -->
      <a class="btn" id="btn-linkedin" href="#" style="display:none">
        <div class="btn-icon icon-linkedin">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </div>
        <div class="btn-label">LinkedIn<span>View profile</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- Book a meeting -->
      <a class="btn" id="btn-calendly" href="#" style="display:none">
        <div class="btn-icon icon-calendar">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
        </div>
        <div class="btn-label">Book a meeting<span>Schedule time</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- iMessage -->
      <a class="btn" id="btn-imessage" href="#" style="display:none">
        <div class="btn-icon icon-message">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/>
          </svg>
        </div>
        <div class="btn-label">iMessage<span>Send a message</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- WhatsApp -->
      <a class="btn" id="btn-whatsapp" href="#" style="display:none">
        <div class="btn-icon icon-whatsapp">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </div>
        <div class="btn-label">WhatsApp<span>Send a message</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

    </div>

    <div class="footer">Shared via EA Watch</div>

  </div>

  <script>
    async function loadCard() {
      try {
        const res = await fetch('/api/config/public');
        if (!res.ok) return;
        const c = await res.json();

        if (c.display_name) {
          document.getElementById('display-name').textContent = c.display_name;
          // Update initials too
          const initials = c.display_name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
          document.getElementById('avatar-initials').textContent = initials;
        }
        if (c.title)        document.getElementById('display-title').textContent = c.title;

        if (c.avatar_url) {
          const avatar = document.getElementById('avatar');
          avatar.innerHTML = `<img src="${c.avatar_url}" alt="Profile photo" onerror="this.parentElement.innerHTML='<span id=avatar-initials>${document.getElementById('avatar-initials')?.textContent||'?'}</span>'">`;
        }

        if (c.bio) {
          const bio = document.getElementById('display-bio');
          bio.textContent = c.bio;
          bio.style.display = 'block';
        }

        if (c.linkedin) {
          const btn = document.getElementById('btn-linkedin');
          btn.href = c.linkedin;
          btn.style.display = 'flex';
        }
        if (c.calendly) {
          const btn = document.getElementById('btn-calendly');
          btn.href = c.calendly;
          btn.style.display = 'flex';
        }
        if (c.imessage) {
          const btn = document.getElementById('btn-imessage');
          btn.href = `sms:${c.imessage}`;
          btn.style.display = 'flex';
        }
        if (c.whatsapp) {
          const btn = document.getElementById('btn-whatsapp');
          btn.href = `https://wa.me/${c.whatsapp.replace(/\D/g,'')}`;
          btn.style.display = 'flex';
        }
      } catch (e) {
        // Fail silently — static fallback content is already visible
      }
    }

    loadCard();
  </script>
</body>
</html>
