<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Marco Rota</title>
  <script src="/shell-pref.js?v=1"></script>
  <link rel="stylesheet" href="/shell.css?v=2">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   rgba(255,255,255,0.08);
      --text:     #f0f0f0;
      --muted:    #888;
      --accent:   #f0f0f0; /* overridden from saved accent when set */
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body.has-app-shell {
      padding: 0;
    }

    .card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Identity */
    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -1px;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .title {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .focus-line {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 6px;
      max-width: 320px;
    }

    .accent-rule {
      width: 40px;
      height: 2px;
      border-radius: 1px;
      background: var(--accent);
      margin: 12px auto 0;
      opacity: 0.85;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      background: #1e1e1e;
      border-color: rgba(255,255,255,0.14);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
    }

    .btn-label {
      flex: 1;
    }

    .btn-label span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .btn-chevron {
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Icon colors */
    .icon-linkedin  { background: #0A66C2; }
    .icon-instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }
    .icon-calendar  { background: #1a1a1a; border: 1px solid var(--border); }
    .icon-message   { background: #1a7f37; }
    .icon-whatsapp  { background: #25D366; }
    .icon-vcard     { background: #2d2d2d; border: 1px solid var(--border); }

    /* Bio */
    .bio {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      padding: 0 8px;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }
    .footer a {
      color: #666;
      text-decoration: none;
    }
    .footer a:active { opacity: 0.85; }
  </style>
</head>
<body class="has-app-shell" data-no-global-legal="1">

          </svg>
        </div>
        <div class="btn-label">Instagram<span>View profile</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- Book a meeting -->
      <a class="btn" id="btn-calendly" href="#" style="display:none">
        <div class="btn-icon icon-calendar">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
        </div>
        <div class="btn-label">Book a meeting<span>Schedule time</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- iMessage -->
      <a class="btn" id="btn-imessage" href="#" style="display:none">
        <div class="btn-icon icon-message">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/>
          </svg>
        </div>
        <div class="btn-label">iMessage<span>Send a message</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <!-- WhatsApp -->
      <a class="btn" id="btn-whatsapp" href="#" style="display:none">
        <div class="btn-icon icon-whatsapp">
          <svg viewBox="0 0 24 24" fill="white">

        <div class="btn-label">WhatsApp<span>Send a message</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>

      <!-- Optional: save to address book (not required to connect) -->
      <button type="button" class="btn" id="btn-vcard" style="display:none" aria-label="Download contact card">
        <div class="btn-icon icon-vcard">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="btn-label">Add to Contacts<span>Download a .vcf card (optional)</span></div>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>

    </div>

    <div class="footer">
      Shared via EA Watch<br>
      <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a>
    </div>

  </div>
  </div>

  <script>
    let lastPublicCard = null;

    /** Trim + strip zero-width chars from pasted handles */
    function cleanSocial(raw) {
      return String(raw || '')
        .replace(/[\u200B-\u200D\uFEFF]/g, '')
        .trim();
    }

    /** Encode path segments for /user/name style URLs */
    function encodePathSegments(path) {
      return String(path || '')
        .split('/')
        .filter(Boolean)
        .map((seg) => encodeURIComponent(seg))
        .join('/');
    }

    function instagramHref(raw) {
      let s = cleanSocial(raw);
      if (!s) return '';
      if (/^https?:\/\//i.test(s)) return s.replace(/^http:\/\//i, 'https://');
      s = s.replace(/^@+/, '');
      s = s.replace(/^(https?:\/\/)?(www\.)?(instagram\.com|instagr\.am)\/?/i, '');
      s = s.replace(/^\/+/, '');
      if (!s) return '';
      const path = encodePathSegments(s);
      return path ? `https://www.instagram.com/${path}/` : '';
    }

    function calendlyHref(raw) {
      let s = cleanSocial(raw);
      if (!s) return '';
      if (/^https?:\/\//i.test(s)) return s.replace(/^http:\/\//i, 'https://');
      s = s.replace(/^\/+/, '');
      s = s.replace(/^(https?:\/\/)?(www\.)?calendly\.com\/?/i, '');
      s = s.replace(/^\/+/, '');
      if (!s) return '';
      let pathPart = s;
      let query = '';
      const qi = s.indexOf('?');
      if (qi >= 0) {
        pathPart = s.slice(0, qi);
        query = s.slice(qi);
      }
      const path = encodePathSegments(pathPart);
      return path ? `https://calendly.com/${path}${query}` : '';
    }

    function linkedinHref(raw) {
      let s = String(raw || '').trim();
      if (!s) return '';
      if (/^https?:\/\//i.test(s)) return s.replace(/^http:\/\//i, 'https://');
      s = s.replace(/^\/+/, '');
      s = s.replace(/^(https?:\/\/)?(www\.)?linkedin\.com\/?/i, '');
      s = s.replace(/^\/+/, '');
      if (!s) return '';
      const lower = s.toLowerCase();
      const known = ['in/', 'company/', 'school/', 'showcase/'];
      const hasPrefix = known.some((p) => lower.startsWith(p));
      if (!hasPrefix && !s.includes('/')) {
        s = 'in/' + s.replace(/^@+/, '');
      }
      const path = encodePathSegments(s);
      return path ? `https://www.linkedin.com/${path}` : '';
    }

    function vcardEscape(s) {
      return String(s ?? '')
        .replace(/\\/g, '\\\\')
        .replace(/\n/g, '\\n')
        .replace(/;/g, '\\;')
        .replace(/,/g, '\\,');
    }

    /** vCard 3.0 N: Family;Given;Middle;Prefix;Suffix */
    function vcardNFromFn(fn) {
      const t = String(fn || '').trim();
      if (!t) return ';;;;';
      const parts = t.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return `;${vcardEscape(parts[0])};;;`;
      const family = parts[parts.length - 1];
      const given = parts.slice(0, -1).join(' ');
      return `${vcardEscape(family)};${vcardEscape(given)};;;`;
    }

    function normalizeTelDigits(s) {
      const t = String(s || '').trim();
      if (!t) return '';
      if (t.startsWith('+')) return '+' + t.slice(1).replace(/\D/g, '');
      const d = t.replace(/\D/g, '');
      return d || '';
    }

    function buildVcard(c) {
      const fn = String(c.display_name || '').trim();
      if (!fn) return '';
      const lines = ['BEGIN:VCARD', 'VERSION:3.0', 'FN:' + vcardEscape(fn), 'N:' + vcardNFromFn(fn)];
      if (c.title) lines.push('TITLE:' + vcardEscape(String(c.title)));
      if (c.bio) lines.push('NOTE:' + vcardEscape(String(c.bio)));
      if (c.linkedin) {
        const li = linkedinHref(c.linkedin);
        if (li) lines.push('URL;TYPE=LinkedIn:' + li);
      }
      {
        const igRaw = cleanSocial(c.instagram || c.stranger_instagram);
        if (igRaw) {
          const ig = instagramHref(igRaw);
          if (ig) lines.push('URL;TYPE=Instagram:' + ig);
        }
      }
      {
        const calRaw = cleanSocial(c.calendly || c.stranger_calendly);
        if (calRaw) {
          const cal = calendlyHref(calRaw);
          if (cal) lines.push('URL;TYPE=Schedule:' + cal);
        }
      }
      const tel =
        normalizeTelDigits(c.imessage) || normalizeTelDigits(c.whatsapp);
      if (tel) lines.push('TEL;TYPE=CELL:' + vcardEscape(tel));
      if (c.avatar_url) lines.push('PHOTO;VALUE=URI:' + String(c.avatar_url).trim());
      lines.push('END:VCARD');
      return lines.join('\r\n');
    }

    function safeVcardFilename(name) {
      const base = String(name || 'contact')
        .trim()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .slice(0, 60) || 'contact';
      return base + '.vcf';
    }

    function wireVcardButton() {
      const btn = document.getElementById('btn-vcard');
      if (!btn) return;
      btn.addEventListener('click', function () {
        const c = lastPublicCard;
        if (!c || !String(c.display_name || '').trim()) return;
        const body = buildVcard(c);
        if (!body) return;
        const blob = new Blob([body], { type: 'text/vcard;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = safeVcardFilename(c.display_name);
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }

    async function loadCard() {
      try {
        const res = await fetch('/api/config/public', { cache: 'no-store' });
        if (!res.ok) return;
        const c = await res.json();

        if (c.accent_hex && /^#[0-9A-Fa-f]{6}$/.test(c.accent_hex)) {
          document.documentElement.style.setProperty('--accent', c.accent_hex);
          document.getElementById('accent-rule').style.display = 'block';
        }

        if (c.display_name) {
          document.getElementById('display-name').textContent = c.display_name;
          // Update initials too
          const initials = c.display_name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
          document.getElementById('avatar-initials').textContent = initials;
        }
        if (c.title)        document.getElementById('display-title').textContent = c.title;

        if (c.focus) {
          const fl = document.getElementById('display-focus');
          fl.textContent = c.focus;
          fl.style.display = 'block';
        }

        if (c.avatar_url) {
          const avatar = document.getElementById('avatar');
          avatar.innerHTML = `<img src="${c.avatar_url}" alt="Profile photo" onerror="this.parentElement.innerHTML='<span id=avatar-initials>${document.getElementById('avatar-initials')?.textContent||'?'}</span>'">`;
        }

        if (c.bio) {
          const bio = document.getElementById('display-bio');
          bio.textContent = c.bio;
          bio.style.display = 'block';
        }

        if (String(c.linkedin || '').trim()) {
          const href = linkedinHref(c.linkedin);
          if (href) {
            const btn = document.getElementById('btn-linkedin');
            btn.href = href;
            btn.style.display = 'flex';
          }
        }
        {
          const igRaw = cleanSocial(c.instagram || c.stranger_instagram);
          if (igRaw) {
            const href = instagramHref(igRaw);
            if (href) {
              const btn = document.getElementById('btn-instagram');
              btn.href = href;
              btn.style.display = 'flex';
            }
          }
        }
        {
          const calRaw = cleanSocial(c.calendly || c.stranger_calendly);
          if (calRaw) {
            const href = calendlyHref(calRaw);
            if (href) {
              const btn = document.getElementById('btn-calendly');
              btn.href = href;
              btn.style.display = 'flex';
            }
          }
        }
        if (c.imessage) {
          const btn = document.getElementById('btn-imessage');
          btn.href = `sms:${c.imessage}`;
          btn.style.display = 'flex';
        }
        if (c.whatsapp) {
          const btn = document.getElementById('btn-whatsapp');
          btn.href = `https://wa.me/${c.whatsapp.replace(/\D/g,'')}`;
          btn.style.display = 'flex';
        }

        lastPublicCard = c;
        if (String(c.display_name || '').trim()) {
          document.getElementById('btn-vcard').style.display = 'flex';
        }
      } catch (e) {
        // Fail silently — static fallback content is already visible
      }
    }

    wireVcardButton();
    loadCard();
  </script>
</body>
