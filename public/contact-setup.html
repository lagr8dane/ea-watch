<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Your presence — EA Watch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --muted: #888;
      --hi: #8ab4ff;
    }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100%; }
    body { padding: 24px 20px 40px; max-width: 420px; margin: 0 auto; }

    header { margin-bottom: 28px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.25; }

    .progress { display: flex; gap: 6px; margin-bottom: 28px; }
    .progress i {
      flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.2s;
    }
    .progress i.on { background: var(--hi); }

    .step { display: none; }
    .step.active { display: block; animation: in 0.25s ease; }
    @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .q { font-size: 18px; font-weight: 500; line-height: 1.35; margin-bottom: 10px; letter-spacing: -0.02em; }
    .helper { font-size: 13px; color: var(--muted); line-height: 1.45; margin-bottom: 16px; }
    .example { font-size: 12px; color: #666; font-style: italic; margin-top: 12px; line-height: 1.4; }

    input[type="text"], input[type="url"], input[type="tel"], textarea {
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 16px; font-family: inherit;
    }
    textarea { min-height: 88px; resize: vertical; }

    .presets { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .preset {
      width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .preset.on { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--hi); }
    .hex-row { display: flex; gap: 10px; align-items: center; }
    .hex-row input { flex: 1; font-family: ui-monospace, monospace; }

    .link-block { margin-bottom: 14px; }
    .link-block label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

    .nav { display: flex; gap: 10px; margin-top: 28px; flex-wrap: wrap; }
    button {
      padding: 14px 20px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 15px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    button.ghost { background: transparent; color: var(--muted); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .err { color: #e88; font-size: 14px; margin-top: 12px; }
    .done { text-align: center; padding: 40px 0; }
    .done p { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
    .done a { color: var(--hi); }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Tap to meet</p>
    <h1 id="headline">Shape how you show up</h1>
  </header>

  <div class="progress" id="progress" aria-hidden="true"></div>

  <div id="steps"></div>
  <p id="err" class="err" style="display:none"></p>

  <div class="nav" id="nav">
    <button type="button" class="ghost" id="btn-back" style="display:none">Back</button>
    <button type="button" class="primary" id="btn-next">Continue</button>
  </div>

  <div class="done" id="done" style="display:none">
    <p>Saved. Your contact page is updated.</p>
    <a href="/contact" style="font-size:15px;font-weight:500;">Preview contact card</a>
    <span style="display:block;margin-top:16px;"><a href="/config" style="font-size:14px;color:var(--muted);">Back to settings</a></span>
  </div>

  <script>
    const QUESTIONS = [
      {
        id: 'display_name',
        question: 'What name should appear?',
        helper_text: 'The one people already know you by.',
        input_type: 'text',
        example_answer: 'Marco Rota',
        required: true,
        maxlength: 80,
      },
      {
        id: 'avatar_url',
        question: 'Photo URL (optional)',
        helper_text: 'Paste a link to an image, or skip. You can upload from Settings later.',
        input_type: 'text',
        example_answer: 'https://…',
        required: false,
        maxlength: 2000,
      },
      {
        id: 'title',
        question: 'How do you describe what you do?',
        helper_text: 'Keep it simple. One line is enough.',
        input_type: 'text',
        example_answer: 'I help companies figure out what’s next.',
        required: false,
        maxlength: 120,
      },
      {
        id: 'stranger_focus',
        question: 'What are you focused on right now?',
        helper_text: 'Optional — makes your card feel current.',
        input_type: 'text',
        example_answer: 'Building a hardware-meets-AI product.',
        required: false,
        maxlength: 160,
      },
      {
        id: 'stranger_bio',
        question: 'How should people reach out?',
        helper_text: 'One line on what kind of conversations you welcome.',
        input_type: 'textarea',
        example_answer: 'Coffee or a call — especially if you care about NFC or personal tools.',
        required: false,
        maxlength: 400,
      },
      {
        id: 'stranger_accent_hex',
        question: 'A color for your card',
        helper_text: 'Used as a subtle accent on your public page.',
        input_type: 'color',
        example_answer: '',
        required: false,
      },
      {
        id: 'links',
        question: 'Where should people connect?',
        helper_text: 'Only fill what you use — empty rows stay hidden on the card.',
        input_type: 'links',
        example_answer: '',
        required: false,
      },
    ];

    const COLOR_PRESETS = ['#8ab4ff', '#c9a87c', '#7d9b76', '#b8a9c9', '#e07a5f', '#f4f1de'];

    let stepIndex = 0;
    let answers = {};
    let baseConfig = null;

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function buildSteps() {
      const host = document.getElementById('steps');
      const prog = document.getElementById('progress');
      prog.innerHTML = QUESTIONS.map((_, i) => '<i data-i="' + i + '"></i>').join('');

      QUESTIONS.forEach((q, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'step';
        wrap.dataset.step = String(i);
        let inner = '<p class="q">' + esc(q.question) + '</p>';
        if (q.helper_text) inner += '<p class="helper">' + esc(q.helper_text) + '</p>';

        if (q.input_type === 'text' || q.input_type === 'textarea') {
          const tag = q.input_type === 'textarea' ? 'textarea' : 'input';
          inner += '<' + tag + ' id="field-' + q.id + '" ' +
            (q.maxlength ? 'maxlength="' + q.maxlength + '" ' : '') +
            'placeholder="" autocomplete="on"></' + tag + '>';
        } else if (q.input_type === 'color') {
          inner += '<div class="presets" id="presets"></div>' +
            '<div class="hex-row"><input type="text" id="field-accent-hex" placeholder="#8ab4ff" maxlength="7" autocomplete="off" />' +
            '<input type="color" id="field-accent-picker" value="#8ab4ff" style="width:48px;height:48px;padding:0;border:none;border-radius:10px;cursor:pointer;background:transparent" /></div>';
        } else if (q.input_type === 'links') {
          inner +=
            '<div class="link-block"><label>LinkedIn</label><input type="url" id="link-linkedin" placeholder="https://linkedin.com/in/…" autocomplete="url"></div>' +
            '<div class="link-block"><label>Booking (Calendly, etc.)</label><input type="url" id="link-calendly" placeholder="https://…" autocomplete="url"></div>' +
            '<div class="link-block"><label>iMessage / SMS</label><input type="tel" id="link-imessage" placeholder="+1 …" autocomplete="tel"></div>' +
            '<div class="link-block"><label>WhatsApp</label><input type="tel" id="link-whatsapp" placeholder="+1 …" autocomplete="tel"></div>';
        }

        if (q.example_answer) inner += '<p class="example">Example: “' + esc(q.example_answer) + '”</p>';
        wrap.innerHTML = inner;
        host.appendChild(wrap);
      });
    }

    function updateProgress() {
      document.querySelectorAll('.progress i').forEach((el, i) => {
        el.classList.toggle('on', i <= stepIndex);
      });
    }

    function showStep(i) {
      document.querySelectorAll('.step').forEach((el, j) => el.classList.toggle('active', j === i));
      document.getElementById('btn-back').style.display = i > 0 ? 'inline-block' : 'none';
      document.getElementById('btn-next').textContent = i === QUESTIONS.length - 1 ? 'Save' : 'Continue';
      updateProgress();

      const q = QUESTIONS[i];
      if (q.input_type === 'color') {
        const presets = document.getElementById('presets');
        if (presets && !presets.dataset.built) {
          presets.dataset.built = '1';
          COLOR_PRESETS.forEach((hex) => {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'preset';
            b.style.background = hex;
            b.title = hex;
            b.addEventListener('click', () => {
              document.getElementById('field-accent-hex').value = hex;
              document.getElementById('field-accent-picker').value = hex;
              presets.querySelectorAll('.preset').forEach((p) => p.classList.remove('on'));
              b.classList.add('on');
            });
            presets.appendChild(b);
          });
        }
        const hexIn = document.getElementById('field-accent-hex');
        const pick = document.getElementById('field-accent-picker');
        if (hexIn && pick) {
          hexIn.oninput = () => {
            if (/^#[0-9A-Fa-f]{6}$/.test(hexIn.value.trim())) pick.value = hexIn.value.trim();
          };
          pick.oninput = () => { hexIn.value = pick.value; };
        }
      }
    }

    function readStep() {
      const q = QUESTIONS[stepIndex];
      if (q.input_type === 'text' || q.input_type === 'textarea') {
        const el = document.getElementById('field-' + q.id);
        return (el && el.value.trim()) || '';
      }
      if (q.input_type === 'color') {
        const raw = document.getElementById('field-accent-hex')?.value.trim() || '';
        if (/^#[0-9A-Fa-f]{6}$/.test(raw)) return raw;
        return '';
      }
      if (q.input_type === 'links') {
        return {
          stranger_linkedin: document.getElementById('link-linkedin')?.value.trim() || '',
          stranger_calendly: document.getElementById('link-calendly')?.value.trim() || '',
          stranger_imessage: document.getElementById('link-imessage')?.value.trim() || '',
          stranger_whatsapp: document.getElementById('link-whatsapp')?.value.trim() || '',
        };
      }
      return '';
    }

    function writeStep() {
      const q = QUESTIONS[stepIndex];
      const v = answers[q.id];
      if (q.input_type === 'text' || q.input_type === 'textarea') {
        const el = document.getElementById('field-' + q.id);
        if (el) el.value = v || '';
      } else if (q.input_type === 'color') {
        const hex = v || '#8ab4ff';
        const hexIn = document.getElementById('field-accent-hex');
        const pick = document.getElementById('field-accent-picker');
        if (hexIn) hexIn.value = /^#[0-9A-Fa-f]{6}$/.test(hex) ? hex : '#8ab4ff';
        if (pick) pick.value = /^#[0-9A-Fa-f]{6}$/.test(hexIn.value) ? hexIn.value : '#8ab4ff';
      } else if (q.input_type === 'links' && v && typeof v === 'object') {
        if (document.getElementById('link-linkedin')) document.getElementById('link-linkedin').value = v.stranger_linkedin || '';
        if (document.getElementById('link-calendly')) document.getElementById('link-calendly').value = v.stranger_calendly || '';
        if (document.getElementById('link-imessage')) document.getElementById('link-imessage').value = v.stranger_imessage || '';
        if (document.getElementById('link-whatsapp')) document.getElementById('link-whatsapp').value = v.stranger_whatsapp || '';
      }
    }

    function validateStep() {
      const q = QUESTIONS[stepIndex];
      const v = readStep();
      if (q.required && (!v || (typeof v === 'string' && !v.trim()))) {
        document.getElementById('err').textContent = 'This one needs a short answer.';
        document.getElementById('err').style.display = 'block';
        return false;
      }
      if (q.id === 'avatar_url' && v && !/^https?:\/\/.+/i.test(v)) {
        document.getElementById('err').textContent = 'Use an http(s) URL, or skip.';
        document.getElementById('err').style.display = 'block';
        return false;
      }
      document.getElementById('err').style.display = 'none';
      return true;
    }

    async function save() {
      const btn = document.getElementById('btn-next');
      btn.disabled = true;
      try {
        const body = {
          ...baseConfig,
          display_name: answers.display_name || baseConfig.display_name,
          title: answers.title != null ? answers.title : baseConfig.title,
          avatar_url: answers.avatar_url != null ? (answers.avatar_url || null) : baseConfig.avatar_url,
          stranger_focus: answers.stranger_focus != null ? (answers.stranger_focus || null) : baseConfig.stranger_focus,
          stranger_bio: answers.stranger_bio != null ? (answers.stranger_bio || null) : baseConfig.stranger_bio,
          stranger_accent_hex: answers.stranger_accent_hex || null,
          stranger_linkedin: answers.stranger_linkedin != null ? (answers.stranger_linkedin || null) : baseConfig.stranger_linkedin,
          stranger_calendly: answers.stranger_calendly != null ? (answers.stranger_calendly || null) : baseConfig.stranger_calendly,
          stranger_imessage: answers.stranger_imessage != null ? (answers.stranger_imessage || null) : baseConfig.stranger_imessage,
          stranger_whatsapp: answers.stranger_whatsapp != null ? (answers.stranger_whatsapp || null) : baseConfig.stranger_whatsapp,
        };
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Save failed');
        document.getElementById('nav').style.display = 'none';
        document.getElementById('steps').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('headline').parentElement.style.display = 'none';
        document.getElementById('done').style.display = 'block';
      } catch (e) {
        document.getElementById('err').textContent = 'Could not save. Check your connection and try again.';
        document.getElementById('err').style.display = 'block';
        btn.disabled = false;
      }
    }

    document.getElementById('btn-next').onclick = async () => {
      if (!validateStep()) return;
      const q = QUESTIONS[stepIndex];
      const v = readStep();
      if (q.input_type === 'links') {
        Object.assign(answers, v);
      } else {
        answers[q.id] = v;
      }

      if (stepIndex < QUESTIONS.length - 1) {
        stepIndex += 1;
        showStep(stepIndex);
        writeStep();
      } else {
        await save();
      }
    };

    document.getElementById('btn-back').onclick = () => {
      const q = QUESTIONS[stepIndex];
      if (q.input_type === 'links') {
        Object.assign(answers, readStep());
      } else {
        answers[q.id] = readStep();
      }
      if (stepIndex > 0) {
        stepIndex -= 1;
        showStep(stepIndex);
        writeStep();
      }
    };

    async function boot() {
      buildSteps();
      const res = await fetch('/api/config', { credentials: 'same-origin' });
      if (res.status === 401) {
        window.location.href = '/challenge';
        return;
      }
      if (!res.ok) {
        document.getElementById('err').textContent = 'Could not load settings.';
        document.getElementById('err').style.display = 'block';
        return;
      }
      baseConfig = await res.json();
      answers = {
        display_name: baseConfig.display_name || '',
        avatar_url: baseConfig.avatar_url || '',
        title: baseConfig.title || '',
        stranger_focus: baseConfig.stranger_focus || '',
        stranger_bio: baseConfig.stranger_bio || '',
        stranger_accent_hex: baseConfig.stranger_accent_hex || '#8ab4ff',
        stranger_linkedin: baseConfig.stranger_linkedin || '',
        stranger_calendly: baseConfig.stranger_calendly || '',
        stranger_imessage: baseConfig.stranger_imessage || '',
        stranger_whatsapp: baseConfig.stranger_whatsapp || '',
      };
      showStep(0);
      writeStep();
    }

    boot();
  </script>
</body>
</html>
